function buildChatCallOptions(calls) {
  const opts = [];
  // Group in request_id order (already sorted server-side) but annotate grouping.
  for (const c of (calls || [])) {
    const provider = c.provider || '?';
    const role = c.role || inferRoleFromKind(c.kind);
    const req = c.request_id != null ? `#${c.request_id}` : '';
    const model = c.model ? ` — ${c.model}` : '';
    const node = c.active_node ? ` @${c.active_node}` : '';
    const liveBadge = c.tmux_session ? ' ▶live' : '';
    const staleBadge = c.transcript_is_stale_scope_dir && !c.tmux_session ? ' ⚠stale-scope' : '';
    const missingBadge = c.artifact_id == null ? ' ∅no-dir' : '';
    const artifact = c.artifact_id ? ` (${c.artifact_id})` : '';
    const label = `[${provider}] ${role}${req}${node}${artifact}${model}${liveBadge}${staleBadge}${missingBadge}`;
    // Key must uniquely identify this call row — scope dirs are shared
    // across bursts (every worker of the same provider/role writes to the
    // same artifact_id), so we include request_id + event_index in the key
    // itself. The actual server call still uses artifact_id via a separate
    // field on the option object.
    const reqTag = c.request_id != null ? c.request_id : '?';
    const evTag = c.event_index != null ? c.event_index : '?';
    const baseId = c.artifact_id || '__missing__';
    const key = `${reqTag}:${evTag}:${baseId}`;
    // callId is what we send to chat-events.json (artifact_id, or a
    // missing placeholder matching the server's behavior).
    const callId = c.artifact_id || `__missing__:${reqTag}:${evTag}`;
    opts.push({ key, callId, label, call: c });
  }
  return opts;
}

function inferRoleFromKind(kind) {
  return kind || 'agent';
}

// Returns the HTML string for one chat-event card. Switched from
// createElement + per-card innerHTML to a string return so renderChatEvents
// can concat 150+ cards and set the container's innerHTML once — dramatically
// faster on chat switches (one HTML parse vs. one per card + one reflow per
// appendChild).
function renderChatCard(ev) {
  const cls = isChatToolEvent(ev) ? ' class="chat-card-tool"' : '';
  const outer = (inner) => `<div${cls} style="margin-bottom:6px;font-size:12px;line-height:1.4">${inner}</div>`;
  if (ev.kind === 'thread_started') {
    return outer(`<span style="color:#6272a4">— thread ${escHtml(String(ev.thread_id || '').slice(0,12) || '?')} started —</span>`);
  } else if (ev.kind === 'turn_started') {
    return outer(`<span style="color:#6272a4;font-weight:bold">— turn started —</span>`);
  } else if (ev.kind === 'turn_completed') {
    const u = ev.usage || {};
    const parts = [];
    if (u.input_tokens != null) parts.push(`in=${u.input_tokens}`);
    if (u.input != null) parts.push(`in=${u.input}`);
    if (u.cached_input_tokens != null) parts.push(`cached=${u.cached_input_tokens}`);
    if (u.cached != null) parts.push(`cached=${u.cached}`);
    if (u.output_tokens != null) parts.push(`out=${u.output_tokens}`);
    if (u.output != null) parts.push(`out=${u.output}`);
    if (u.total != null) parts.push(`total=${u.total}`);
    return outer(`<span style="color:#50fa7b;font-weight:bold">✓ turn completed</span> <span style="color:#6272a4">${escHtml(parts.join(' '))}</span>`);
  } else if (ev.kind === 'agent_message') {
    return outer(`<div style="background:#1e1e3a;border-left:3px solid #bd93f9;padding:6px 10px;border-radius:3px;color:#f8f8f2;white-space:pre-wrap">${escHtml(ev.text || '')}</div>`);
  } else if (ev.kind === 'user_message') {
    return outer(`<div style="background:#1a2332;border-left:3px solid #8be9fd;padding:6px 10px;border-radius:3px;color:#f8f8f2;white-space:pre-wrap">${escHtml(ev.text || '')}</div>`);
  } else if (ev.kind === 'thinking') {
    return outer(`<div style="background:#0f0f23;border-left:3px dashed #f1fa8c;padding:6px 10px;border-radius:3px;color:#bbb;font-style:italic;white-space:pre-wrap;font-size:11px">${escHtml(ev.thinking || '')}</div>`);
  } else if (ev.kind === 'tool_call') {
    const inputStr = ev.tool_input == null ? '' : (typeof ev.tool_input === 'string' ? ev.tool_input : JSON.stringify(ev.tool_input, null, 2));
    return outer(`<div style="background:#0f0f23;border:1px solid #44475a;border-radius:3px;padding:6px 10px;color:#8be9fd;font-family:Menlo,Consolas,monospace;font-size:11px"><div><span style="color:#ff79c6">tool</span> ${escHtml(ev.tool_name || '?')} ${ev.id ? `<span style="color:#6272a4">[${escHtml(ev.id)}]</span>` : ''}</div>${inputStr ? `<pre style="margin:4px 0 0 0;color:#f8f8f2;white-space:pre-wrap;max-height:200px;overflow:auto">${escHtml(inputStr)}</pre>` : ''}</div>`);
  } else if (ev.kind === 'tool_result') {
    const outStr = ev.tool_output == null ? '' : (typeof ev.tool_output === 'string' ? ev.tool_output : JSON.stringify(ev.tool_output, null, 2));
    const badge = ev.is_error
      ? '<span style="color:#ff5555">✗ error</span>'
      : '<span style="color:#50fa7b">✓ ok</span>';
    return outer(`<div style="background:#0f0f23;border:1px solid #44475a;border-radius:3px;padding:6px 10px;color:#f8f8f2;font-family:Menlo,Consolas,monospace;font-size:11px"><div><span style="color:#ff79c6">result</span> ${ev.id ? `<span style="color:#6272a4">[${escHtml(ev.id)}]</span>` : ''} ${badge}</div>${outStr ? `<pre style="margin:4px 0 0 0;white-space:pre-wrap;max-height:200px;overflow:auto">${escHtml(outStr)}</pre>` : ''}</div>`);
  } else if (ev.kind === 'command_execution') {
    const statusBadge = ev.status === 'in_progress'
      ? '<span style="color:#f1fa8c">⏵ running</span>'
      : ev.exit_code === 0
        ? '<span style="color:#50fa7b">✓ exit 0</span>'
        : `<span style="color:#ff5555">✗ exit ${ev.exit_code}</span>`;
    return outer(`<div style="background:#0f0f23;border:1px solid #44475a;border-radius:3px;padding:6px 10px;color:#8be9fd;font-family:Menlo,Consolas,monospace;font-size:11px"><div style="display:flex;gap:6px;align-items:baseline"><span style="color:#ff79c6">$</span><span style="flex:1;white-space:pre-wrap">${escHtml(ev.command || '')}</span>${statusBadge}</div>${ev.aggregated_output ? `<pre style="margin:4px 0 0 0;color:#f8f8f2;white-space:pre-wrap;max-height:200px;overflow:auto">${escHtml(ev.aggregated_output)}</pre>` : ''}</div>`);
  } else if (ev.kind === 'file_change') {
    const rows = (ev.changes || []).map((c) => {
      const icon = c.kind === 'add' ? '＋' : c.kind === 'delete' ? '−' : c.kind === 'modify' ? '✎' : '·';
      const color = c.kind === 'add' ? '#50fa7b' : c.kind === 'delete' ? '#ff5555' : '#f1fa8c';
      return `<div style="font-family:Menlo,Consolas,monospace;font-size:11px"><span style="color:${color}">${icon}</span> ${escHtml(c.path)}</div>`;
    }).join('');
    const statusBadge = ev.status === 'in_progress'
      ? '<span style="color:#f1fa8c">⏵ writing</span>'
      : '<span style="color:#50fa7b">✓ done</span>';
    return outer(`<div style="background:#0f0f23;border:1px solid #44475a;border-radius:3px;padding:6px 10px"><div style="color:#8be9fd;font-size:11px;margin-bottom:4px">file changes ${statusBadge}</div>${rows}</div>`);
  } else if (ev.kind === 'item_other') {
    return outer(`<div style="color:#6272a4;font-family:Menlo,Consolas,monospace;font-size:11px">(${escHtml(ev.item_type)}) <span style="color:#8be9fd">${ev.status || ''}</span></div>`);
  } else {
    const raw = typeof ev.raw === 'string' ? ev.raw : (ev.text ? ev.text : JSON.stringify(ev.raw || ev));
    return outer(`<div style="color:#6272a4;font-family:Menlo,Consolas,monospace;font-size:11px;white-space:pre-wrap">${escHtml(raw).slice(0,600)}</div>`);
  }
}

function isChatToolEvent(ev) {
  const kind = String(ev?.kind || '');
  if (['tool_call', 'tool_result', 'command_execution', 'file_change'].includes(kind)) return true;
  if (kind === 'item_other') {
    const itemType = String(ev.item_type || '').toLowerCase();
    if (/(tool|function|command|file_change)/.test(itemType)) return true;
  }
  if (kind === 'other') {
    const raw = typeof ev.raw === 'string' ? ev.raw : JSON.stringify(ev.raw || '');
    return /\b(tool_call|tool_use|tool_result|function_call|command_execution|file_change)\b/i.test(raw);
  }
  return false;
}

// Always render every event; let CSS hide tool cards when the "Thoughts
// only" class is on the container. Toggling the filter is then a class flip
// with no fetch or DOM rebuild. The empty-state element is rendered too —
// CSS only reveals it when (a) thoughts-only is active and (b) every event
// in the burst was a tool event (so the user sees a clear message instead
// of an empty pane).
//
// Builds one big HTML string and sets innerHTML once: a 150-event chat used
// to take ~150 createElement+innerHTML+appendChild round-trips (~hundreds of
// ms on a switch); the single-set approach is one HTML parse + one reflow.
function renderChatEvents(container, events, opts) {
  const allEvents = Array.isArray(events) ? events : [];
  let toolCount = 0;
  const parts = new Array(allEvents.length);
  for (let i = 0; i < allEvents.length; i++) {
    const ev = allEvents[i];
    if (isChatToolEvent(ev)) toolCount++;
    parts[i] = renderChatCard(ev);
  }
  const allTools = allEvents.length > 0 && toolCount === allEvents.length;
  parts.push(`<div class="chat-thoughts-empty-state${allTools ? ' show' : ''}" style="color:#6272a4;font-size:12px">All transcript events in this burst are tool events hidden by Thoughts only.</div>`);
  container.innerHTML = parts.join('');
  applyChatThoughtsOnlyClass(container);
  return {
    shown: allEvents.length - toolCount,
    hidden: toolCount,
    total: allEvents.length,
  };
}

// Per-call render cache so switching back to a previously-viewed call is
// instant — no fetch, no re-render. Keyed on (cycle, call_id, source); not
// populated for the live cycle (events grow with time, and the live tab is
// already on a 3s auto-refresh anyway).
const CHAT_EVENTS_RENDER_CACHE_MAX = 16;
const chatEventsRenderCache = new Map(); // key -> {html, stats, statusText, staleNote}

function chatRenderCacheKey(cycleKey, callId, source) {
  return `${cycleKey}|${callId}|${source || 'transcript'}`;
}

function rememberChatRender(key, entry) {
  if (chatEventsRenderCache.has(key)) chatEventsRenderCache.delete(key);
  chatEventsRenderCache.set(key, entry);
  while (chatEventsRenderCache.size > CHAT_EVENTS_RENDER_CACHE_MAX) {
    const firstKey = chatEventsRenderCache.keys().next().value;
    chatEventsRenderCache.delete(firstKey);
  }
}

function applyChatThoughtsOnlyClass(container) {
  const c = container || document.getElementById('chat-view-container');
  if (!c) return;
  c.classList.toggle('thoughts-only', !!chatThoughtsOnlyMode);
}

// Update the "Cycle X • N events [• thoughts only, K hidden]" status line
// without going through refreshChatView (which would re-fetch).
function updateChatStatusForThoughtsToggle() {
  const status = document.getElementById('chat-refresh-status');
  if (!status || !chatLastRenderStats) return;
  const { total, hidden } = chatLastRenderStats;
  const cycleKey = chatCurrentCycleKey;
  if (!cycleKey) return;
  const suffix = chatThoughtsOnlyMode ? ` • thoughts only, ${hidden} hidden` : '';
  status.textContent = `Cycle ${cycleKey} • ${total} event${total === 1 ? '' : 's'}${suffix}`;
}

function renderChatMissing(container, promptExcerpt, opts) {
  const { isLive, canTui } = opts || {};
  let banner;
  if (canTui) {
    banner = `
      <div style="color:#f1fa8c;font-size:12px;margin-bottom:8px">
        Transcript not yet written — this burst is still running.
        <button id="chat-missing-use-tui" style="margin-left:6px;padding:2px 8px;font-size:11px;background:#24345f;color:#fff;border:1px solid #8be9fd;border-radius:4px;cursor:pointer">View live pane</button>
      </div>`;
  } else if (isLive) {
    banner = `
      <div style="color:#f1fa8c;font-size:12px;margin-bottom:8px">
        No transcript yet for this burst.
      </div>`;
  } else {
    banner = `
      <div style="color:#f1fa8c;font-size:12px;margin-bottom:8px">
        This burst predates the per-cycle transcript snapshot; only the prompt is available.
      </div>`;
  }
  container.innerHTML = `
    ${banner}
    <details>
      <summary style="cursor:pointer;color:#8be9fd;font-size:12px">Prompt</summary>
      <pre style="margin:6px 0 0 0;color:#e0e0e0;font-family:Menlo,Consolas,monospace;font-size:11px;white-space:pre-wrap;max-height:50vh;overflow:auto">${escHtml(promptExcerpt || '(empty)')}</pre>
    </details>
  `;
  const tuiBtn = document.getElementById('chat-missing-use-tui');
  if (tuiBtn) {
    tuiBtn.addEventListener('click', () => {
      const toggle = document.getElementById('chat-tui-toggle');
      if (toggle && !toggle.disabled) {
        toggle.checked = true;
        chatTuiMode = true;
        chatUserTouchedTui = true;
        chatScrollPinnedToBottom = true;
        refreshChatView({ immediate: true });
      }
    });
  }
}

function renderChatTui(container, text) {
  container.innerHTML = '';
  const pre = document.createElement('pre');
  pre.style.cssText = 'color:#e0e0e0;font-family:Menlo,Consolas,monospace;font-size:11px;line-height:1.35;white-space:pre;margin:0';
  pre.textContent = text || '(pane empty)';
  container.appendChild(pre);
}

async function refreshChatView(opts) {
  stopChatAutoRefresh();
  if (detailMode !== 'chat') return;
  // Capture an invocation sequence number; if a newer refresh starts (user
  // dropdown change, slider, auto-refresh tick, tab switch), every later
  // await-resume point checks `seq !== chatRefreshSeq` and bails out before
  // touching the DOM. Without this, a stale in-flight chat-events fetch for
  // the previously-selected burst overwrites the user's new selection. The
  // helper `stale()` returns true once we've been superseded.
  const seq = ++chatRefreshSeq;
  const stale = () => seq !== chatRefreshSeq;
  // Notify the historical-state prewarm to back off while we're fetching
  // interactive chat data — the prewarm queue saturates the browser's
  // per-host connection pool and otherwise queues our fetches behind it.
  chatRefreshInFlight++;
  markInteractiveActivity();
  try {
  const status = document.getElementById('chat-refresh-status');
  const select = document.getElementById('chat-call-select');
  const tuiToggle = document.getElementById('chat-tui-toggle');
  const thoughtsToggle = document.getElementById('chat-thoughts-only-toggle');
  const container = document.getElementById('chat-view-container');
  if (!status || !select || !container || !tuiToggle || !thoughtsToggle) return;
  thoughtsToggle.checked = chatThoughtsOnlyMode;
  const cycleKey = selectedChatCycleKey();
  const cycleChanged = cycleKey !== chatCurrentCycleKey;
  chatCurrentCycleKey = cycleKey;
  if (cycleChanged) {
    // Reset selection when moving between cycles.
    chatSelectedCallId = null;
    chatTuiMode = false;
    tuiToggle.checked = false;
    chatUserTouchedSelect = false;
    chatUserTouchedTui = false;
  }
  try {
    const callsUrl = apiPath(`chat-calls.json?cycle=${encodeURIComponent(cycleKey)}`);
    const callsResp = await fetch(callsUrl);
    if (stale()) return;
    if (!callsResp.ok) throw new Error(`HTTP ${callsResp.status}`);
    const callsData = await callsResp.json();
    if (stale()) return;
    const calls = Array.isArray(callsData.calls) ? callsData.calls : [];
    const options = buildChatCallOptions(calls);
    const optionsHtml = options.length
      ? options.map((o) => `<option value="${escHtml(o.key)}">${escHtml(o.label)}</option>`).join('')
      : '<option value="">(no calls)</option>';
    // For the live cycle, the "current agent" is the burst with an active
    // tmux session. Prefer it as the default selection; and since the user
    // will almost always want to see its live pane, default TUI mode on too.
    const liveOption = cycleKey === 'live'
      ? options.find((o) => o.call && o.call.tmux_session)
      : null;
    // Detect option-list changes via a stable signature of the keys instead
    // of comparing serialized `select.innerHTML` — browsers normalize attr
    // order/case and reflect the user's selected option, so the round-tripped
    // innerHTML usually doesn't match what we set, triggering a full rebuild
    // every auto-refresh tick and collapsing the open dropdown mid-click.
    const optionsKeySig = options.length
      ? `${cycleKey}|${options.map((o) => o.key).join('||')}`
      : `${cycleKey}|__empty__`;
    if (select.dataset.optionsKeySig !== optionsKeySig) {
      const prev = chatSelectedCallId;
      select.innerHTML = optionsHtml;
      select.dataset.optionsKeySig = optionsKeySig;
      if (prev && options.some((o) => o.key === prev)) {
        select.value = prev;
      } else if (chatUserTouchedSelect && prev) {
        // User explicitly picked this burst but it's no longer in the list.
        // Don't silently jump them elsewhere — surface it via the empty-state
        // block below.
        chatSelectedCallId = null;
      } else if (liveOption) {
        chatSelectedCallId = liveOption.key;
        select.value = chatSelectedCallId;
        if (!chatUserTouchedTui) {
          chatTuiMode = true;
          tuiToggle.checked = true;
        }
      } else if (options.length > 0) {
        chatSelectedCallId = options[0].key;
        select.value = chatSelectedCallId;
      } else {
        chatSelectedCallId = null;
      }
    } else if (liveOption && !chatUserTouchedSelect
               && chatSelectedCallId !== liveOption.key) {
      // A new live burst appeared while we were sitting on a finished one —
      // swap to it unless the user has manually changed the selection.
      chatSelectedCallId = liveOption.key;
      select.value = chatSelectedCallId;
      if (!chatUserTouchedTui) {
        chatTuiMode = true;
        tuiToggle.checked = true;
      }
    }
    if (!chatSelectedCallId || !options.length) {
      const msg = options.length
        ? 'Your previously-selected burst is no longer available. Choose another from the dropdown.'
        : 'No calls recorded for this cycle.';
      container.innerHTML = `<div style="color:#6272a4;font-size:12px">${msg}</div>`;
      status.textContent = `Cycle ${cycleKey}`;
      tuiToggle.disabled = true;
      return;
    }
    const currentOpt = options.find((o) => o.key === chatSelectedCallId) || null;
    const currentCall = currentOpt?.call || null;
    const currentCallId = currentOpt?.callId || null;
    const canTui = !!(cycleKey === 'live' && currentCall && currentCall.has_tui_pane);
    tuiToggle.disabled = !canTui;
    if (!canTui && chatTuiMode) {
      chatTuiMode = false;
      tuiToggle.checked = false;
    }
    // Codex is headless — there's no tmux pane behind a codex burst, so
    // hide the Live TUI label entirely for codex calls rather than show it
    // as a permanently-disabled control. For claude/gemini calls we keep
    // the label visible (even when canTui=false) so the user can see the
    // option exists when a pane becomes available later.
    const tuiLabel = document.getElementById('chat-tui-toggle-label');
    if (tuiLabel) {
      tuiLabel.style.display =
        currentCall && currentCall.provider === 'codex' ? 'none' : 'flex';
    }
    const thoughtsLabel = document.getElementById('chat-thoughts-only-toggle-label');
    thoughtsToggle.disabled = chatTuiMode;
    if (thoughtsLabel) thoughtsLabel.style.opacity = chatTuiMode ? '0.55' : '1';
    // Burst with no resolved chat dir — transcript fetches have nothing to
    // read, but live TUI can still be available via the request's tmux pane.
    if (currentCall && !currentCall.artifact_id && !chatTuiMode) {
      container.innerHTML = `
        <div style="color:#f1fa8c;font-size:12px;margin-bottom:8px">
          This burst was issued (request #${escHtml(String(currentCall.request_id))}, ${escHtml(currentCall.kind || '')}${currentCall.active_node ? ' @' + escHtml(currentCall.active_node) : ''}) but no chat directory was located. It may have been evicted or never written.
        </div>
      `;
      status.textContent = `Cycle ${cycleKey} • no chat dir`;
      return;
    }
    const source = chatTuiMode ? 'tui' : 'transcript';
    const evParams = new URLSearchParams({
      cycle: cycleKey,
      call_id: currentCallId || '',
      source,
    });
    if (currentCall) {
      if (currentCall.request_id != null) evParams.set('request_id', String(currentCall.request_id));
      if (currentCall.event_index != null) evParams.set('event_index', String(currentCall.event_index));
      if (currentCall.lane) evParams.set('lane', String(currentCall.lane));
      if (currentCall.kind) evParams.set('kind', String(currentCall.kind));
      if (currentCall.provider) evParams.set('provider', String(currentCall.provider));
      if (currentCall.role) evParams.set('role', String(currentCall.role));
    }
    const evUrl = apiPath(`chat-events.json?${evParams.toString()}`);
    // Render-cache fast path: for non-live cycles in transcript mode, a given
    // (cycle, call_id, source) is immutable — replay the cached HTML + status
    // and skip the fetch + render entirely.
    // Cache key uses the dropdown row's unique key — *not* `currentCallId`,
    // which is the artifact_id and can be shared across bursts that wrote to
    // the same scope dir. Using artifact_id here caused the cache to return a
    // sibling burst's content when the user switched rows.
    const cacheKey = cycleKey !== 'live' && !chatTuiMode
      ? chatRenderCacheKey(cycleKey, chatSelectedCallId, source)
      : null;
    if (cacheKey) {
      const cached = chatEventsRenderCache.get(cacheKey);
      if (cached) {
        if (stale()) return;
        container.classList.remove('tui-snapshot','tui-live');
        container.innerHTML = cached.html;
        applyChatThoughtsOnlyClass(container);
        chatLastRenderStats = cached.stats;
        const suffix = chatThoughtsOnlyMode ? ` • thoughts only, ${cached.stats.hidden} hidden` : '';
        status.textContent = `Cycle ${cycleKey} • ${cached.stats.total} event${cached.stats.total === 1 ? '' : 's'}${suffix}`;
        if (chatScrollPinnedToBottom) container.scrollTop = container.scrollHeight;
        return;
      }
    }
    const evResp = await fetch(evUrl);
    if (stale()) return;
    if (!evResp.ok) throw new Error(`HTTP ${evResp.status}`);
    const evData = await evResp.json();
    if (stale()) return;
    const staleNote = (evData.call && evData.call.transcript_is_stale_scope_dir)
      ? `<div style="background:#332b1a;border-left:3px solid #f1fa8c;padding:6px 10px;margin-bottom:8px;color:#f1fa8c;font-size:11px">
          ⚠ Stale-scope transcript: ${escHtml(evData.note || 'This dir is rewritten each burst in this scope; attribution to this specific request is best-effort.')}
        </div>`
      : '';
    if (chatTuiMode) {
      // TUI mode renders raw pane text — no per-event cards, so the
      // Thoughts-only toggle has no transcript stats to apply.
      chatLastRenderStats = null;
      const text = (evData.events || []).map((e) => e.text || '').join('\n');
      renderChatTui(container, text);
      const isSnapshot = !!evData.snapshot_mtime_ms;
      // Visually distinguish a frozen snapshot from a live capture so the
      // user doesn't think a silent agent is still churning. Apply a
      // grey dashed border + dim overlay + prominent banner on the
      // container. Live capture gets a green pulsing border.
      container.classList.toggle('tui-snapshot', isSnapshot);
      container.classList.toggle('tui-live', !isSnapshot);
      if (isSnapshot) {
        const ts = new Date(evData.snapshot_mtime_ms).toLocaleTimeString();
        const banner = `<div style="background:#3d2a1a;border:2px solid #ffb86c;border-radius:6px;padding:10px 12px;margin-bottom:10px;color:#ffb86c;font-size:13px;font-weight:bold;text-align:center;letter-spacing:0.5px">
          📸 FROZEN PANE SNAPSHOT — captured at ${escHtml(ts)}
          <div style="font-weight:normal;font-size:11px;color:#d6a875;margin-top:3px">Burst has exited; no live tmux session. Content below will not update.</div>
        </div>`;
        container.insertAdjacentHTML('afterbegin', banner);
      } else {
        const banner = `<div style="background:#1a3d2e;border-left:3px solid #50fa7b;padding:5px 10px;margin-bottom:8px;color:#50fa7b;font-size:11px">
          <span class="live-dot"></span> LIVE TUI — capturing tmux session in real time (auto-refresh 3 s)
        </div>`;
        container.insertAdjacentHTML('afterbegin', banner);
      }
      if (staleNote) container.insertAdjacentHTML('afterbegin', staleNote);
      status.textContent = isSnapshot
        ? `Cycle ${cycleKey} • 📸 FROZEN snapshot`
        : `Cycle ${cycleKey} • ▶ live TUI`;
    } else if (evData.missing) {
      container.classList.remove('tui-snapshot','tui-live');
      renderChatMissing(container, evData.prompt_excerpt || '', {
        isLive: cycleKey === 'live',
        canTui,
      });
      if (staleNote) container.insertAdjacentHTML('afterbegin', staleNote);
      status.textContent = cycleKey === 'live'
        ? `Cycle ${cycleKey} • transcript not yet written`
        : `Cycle ${cycleKey} • legacy burst (no transcript)`;
    } else {
      container.classList.remove('tui-snapshot','tui-live');
      const renderStats = renderChatEvents(container, evData.events || [], {
        thoughtsOnly: chatThoughtsOnlyMode,
      });
      chatLastRenderStats = renderStats;
      if (staleNote) container.insertAdjacentHTML('afterbegin', staleNote);
      const n = renderStats.total;
      const suffix = chatThoughtsOnlyMode ? ` • thoughts only, ${renderStats.hidden} hidden` : '';
      status.textContent = `Cycle ${cycleKey} • ${n} event${n === 1 ? '' : 's'}${suffix}`;
      // Cache the rendered HTML so a future switch back to this call is
      // instant. Capture innerHTML *after* the staleNote prepend so the
      // replay path doesn't need to re-derive it.
      if (cacheKey) {
        rememberChatRender(cacheKey, { html: container.innerHTML, stats: renderStats });
      }
    }
    if (chatScrollPinnedToBottom) {
      container.scrollTop = container.scrollHeight;
    }
  } catch (err) {
    if (!stale()) status.textContent = `Error: ${err.message || err}`;
  }
  // Don't schedule a follow-up refresh from a superseded invocation — the
  // newer refresh that bumped chatRefreshSeq already owns the timer.
  if (!stale() && detailMode === 'chat' && chatCurrentCycleKey === 'live') {
    chatAutoRefreshTimer = setTimeout(() => refreshChatView({ immediate: false }), 3000);
  }
  } finally {
    chatRefreshInFlight = Math.max(0, chatRefreshInFlight - 1);
  }
}

function renderCurrentDetail() {
  for (const [id, key] of [
    ['mode-node', 'node'], ['mode-chat', 'chat'],
    ['mode-progress', 'progress'], ['mode-usage', 'usage'], ['mode-kernel', 'kernel'],
  ]) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', detailMode === key);
  }
  if (detailMode === 'chat') { renderChatDetail(); return; }
  if (detailMode === 'progress') { renderProgressDetail(); return; }
  if (detailMode === 'usage') { renderUsageDetail(); return; }
  if (detailMode === 'kernel') { renderKernelDetail(); return; }
  if (selectedNode) {
    renderNodeDetail(selectedNode);
    return;
  }
  document.getElementById('detail-content').innerHTML = `
    <h2>Select a node</h2>
    <p style="color:#6272a4">Tap a node in the DAG to see details.</p>
  `;
}

const VALID_DETAIL_MODES = new Set(['node', 'chat', 'progress', 'usage', 'kernel']);
function setDetailMode(mode) {
  const nextMode = VALID_DETAIL_MODES.has(mode) ? mode : 'node';
  if (detailMode === 'chat' && nextMode !== 'chat') stopChatAutoRefresh();
  if (detailMode === 'kernel' && nextMode !== 'kernel') stopKernelAutoRefresh();
  detailMode = nextMode;
  renderCurrentDetail();
}

// Mobile pane switcher: flip between the DAG and the Details pane full-screen.
// On desktop this is a no-op (the switcher itself is display:none via CSS).
function setMobilePane(pane) {
  const showDetail = pane === 'detail';
  document.body.classList.toggle('mobile-view-detail', showDetail);
  const dagBtn = document.getElementById('mobile-tab-dag');
  const detailBtn = document.getElementById('mobile-tab-detail');
  if (dagBtn) dagBtn.classList.toggle('active', !showDetail);
  if (detailBtn) detailBtn.classList.toggle('active', showDetail);
}

function escHtml(s) {
  // Escape both element-text-relevant chars and attribute-quote chars so it's
  // safe to use the result inside `attr="…"` and `attr='…'` contexts as well.
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Client-side cache for historical state-at responses. Past cycles are
// immutable, so once fetched (or prewarmed by the server) we never need
// to refetch them. Skipping the round-trip lets the slider feel
// instantaneous when revisiting cycles.
const historicalStateCache = new Map();
const historicalStateInflight = new Map();

function fetchHistoricalState(cycle) {
  if (historicalStateCache.has(cycle)) return Promise.resolve(historicalStateCache.get(cycle));
  if (historicalStateInflight.has(cycle)) return historicalStateInflight.get(cycle);
  const p = (async () => {
    const resp = await fetch(apiPath(`state-at/${cycle}.json`));
    if (!resp.ok) throw new Error(`state-at/${cycle} -> ${resp.status}`);
    const data = await resp.json();
    historicalStateCache.set(cycle, data);
    return data;
  })().finally(() => historicalStateInflight.delete(cycle));
  historicalStateInflight.set(cycle, p);
  return p;
}

// Speculative prewarm — kick off background fetches once the server has
// answered the cycles list. They populate the client cache so the slider
// feels instant on cycles the user hasn't visited yet. The server's own
// prewarm runs in parallel; whichever populates first wins.
//
// Throttled and UI-aware: at 75 ms/tick with hundreds of cycles, the prior
// implementation saturated the browser's 6-connection-per-host pool with
// state-at fetches, queuing interactive requests (chat-events.json on a
// dropdown change) for seconds. Now the tick (a) waits 1.5 s after the last
// observed user interaction (`markInteractiveActivity`), (b) skips while a
// chat refresh is in flight (`chatRefreshInFlight > 0`) or any historical
// fetch is in flight (cap concurrency at 1), and (c) uses a 500 ms gap.
let lastInteractiveActivityAt = 0;
let chatRefreshInFlight = 0;
function markInteractiveActivity() {
  lastInteractiveActivityAt = Date.now();
}
function prewarmHistoricalStates(cycles) {
  if (!Array.isArray(cycles) || !cycles.length) return;
  const queue = cycles
    .map(c => (c && typeof c === 'object') ? c.cycle : c)
    .filter(c => Number.isInteger(c))
    .filter(c => !historicalStateCache.has(c) && !historicalStateInflight.has(c));
  let i = 0;
  const PREWARM_GAP_MS = 500;
  const PREWARM_IDLE_REQUIRED_MS = 1500;
  const tick = () => {
    if (i >= queue.length) return;
    const sinceActivity = Date.now() - lastInteractiveActivityAt;
    const blocked =
      chatRefreshInFlight > 0
      || historicalStateInflight.size > 0
      || sinceActivity < PREWARM_IDLE_REQUIRED_MS;
    if (blocked) {
      // Defer; check again after the idle requirement could plausibly clear.
      const wait = Math.max(PREWARM_GAP_MS,
        PREWARM_IDLE_REQUIRED_MS - sinceActivity);
      setTimeout(tick, wait);
      return;
    }
    // Skip cycles that became cached / inflight while we were waiting.
    while (i < queue.length
           && (historicalStateCache.has(queue[i]) || historicalStateInflight.has(queue[i]))) {
      i++;
    }
    if (i >= queue.length) return;
    fetchHistoricalState(queue[i++]).catch(() => {});
    setTimeout(tick, PREWARM_GAP_MS);
  };
  setTimeout(tick, 2000);  // initial settle so first user actions go first
}

async function updateCycleInfo() {
  const slider = document.getElementById('cycle-slider');
  const idx = parseInt(slider.value);
  const slot = timelineSlots[idx];
  const info = document.getElementById('cycle-info');
  const isLatest = slot === 'current';
  const seq = ++timelineUpdateSeq;
  refreshCycleStepButtons();
  renderTimelineSlotLabels();

  if (isLatest) {
    // Show current live state
    const liveCycle = liveCycleNumber();
    info.textContent = `Current (live, cycle ${liveCycle})`;
    const live = await fetchViewerState(apiPath('viewer-state.json'));
    if (seq !== timelineUpdateSeq) return;
    liveState = live;
    allNodes = live.nodes || {};
    invalidateDefClosure();
    currentState = live;
    renderTimelineSlotLabels();
    renderHeader();
    renderDAG();
    renderCurrentDetail();
    return;
  }

  const val = slot;
  const cycle = allCycles.find(c => c.cycle === val);
  if (cycle) {
    info.textContent = `Cycle ${val}: ${cycle.phase || '?'} | ${cycle.outcome || '?'}`;
  } else {
    info.textContent = `Cycle ${val}`;
  }

  // Load historical state — cache hit returns synchronously-fast,
  // cache miss issues one fetch and stores for next time.
  try {
    const data = await fetchHistoricalState(val);
    if (seq !== timelineUpdateSeq) return;
    allNodes = data.nodes || {};
    invalidateDefClosure();
    currentState = data;
    renderHeader();
    const svg = document.getElementById('dag-svg');
    const savedVB = svg.getAttribute('viewBox');
    renderDAG();
    if (savedVB) svg.setAttribute('viewBox', savedVB);
    renderCurrentDetail();
  } catch {}
}

document.getElementById('cycle-slider').addEventListener('input', () => {
  // Tell the prewarm to back off — slider movement bursts state-at fetches
  // that we'd otherwise have to fight for connection-pool slots.
  markInteractiveActivity();
  updateCycleInfo();
});

function stepCycle(delta) {
  const slider = document.getElementById('cycle-slider');
  const min = parseInt(slider.min || '0', 10);
  const max = parseInt(slider.max || '0', 10);
  const cur = parseInt(slider.value || '0', 10);
  const next = Math.min(max, Math.max(min, cur + delta));
  if (next === cur) return;
  selectTimelineSlot(next);
}

function refreshCycleStepButtons() {
  const slider = document.getElementById('cycle-slider');
  const prev = document.getElementById('cycle-prev');
  const next = document.getElementById('cycle-next');
  if (!slider || !prev || !next) return;
  const min = parseInt(slider.min || '0', 10);
  const max = parseInt(slider.max || '0', 10);
  const cur = parseInt(slider.value || '0', 10);
  prev.disabled = cur <= min;
  next.disabled = cur >= max;
}

document.getElementById('cycle-prev').addEventListener('click', () => stepCycle(-1));
document.getElementById('cycle-next').addEventListener('click', () => stepCycle(1));

function renderFeedbackPanel() {
  const container = document.getElementById('feedback-container');
  const phase = currentState?.state?.phase || '';
  const lastReview = currentState?.state?.last_review || {};
  const decision = normalizeReviewDecision(lastReview.decision || '');
  const stopped = !currentState?.state?.cycle; // crude check

  // Show feedback panel only when the supervisor is awaiting human input
  const awaiting = Boolean(
    currentState?.state?.awaiting_human_input ||
    currentState?.state?.human_input_outstanding
  );
  if (awaiting) {
    const downloadUrl = apiPath('download-tablet');
    // On mobile, auto-switch to the Details pane when feedback is needed
    setMobilePane('detail');
    container.innerHTML = `
      <div class="feedback-panel">
        <h3>Human Review (${phase})</h3>
        <p style="color:#6272a4; font-size:11px; margin-bottom:8px">
          ${decision === 'advance_phase' ? 'Reviewer wants to advance. Approve or give feedback.' :
            decision === 'need_input' ? 'Reviewer requested human input.' :
            'Review the tablet structure and provide feedback.'}
        </p>
        <p style="margin-bottom:8px"><a href="${downloadUrl}" style="color:#8be9fd; font-size:12px">Download tablet snapshot (.zip)</a></p>
        <textarea id="feedback-text" placeholder="Enter feedback for the worker (or leave empty to approve)..."></textarea>
        <div>
          <button class="btn btn-approve" onclick="submitFeedback('approve')">✓ Approve & Advance</button>
          <button class="btn btn-feedback" onclick="submitFeedback('feedback')">↩ Send Feedback</button>
        </div>
        <div class="msg" id="feedback-msg"></div>
      </div>
    `;
  } else {
    container.innerHTML = '';
  }
}

function normalizeReviewDecision(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  return raw
    .replace(/([a-z0-9])([A-Z])/g, '$1_$2')
    .replace(/[\s-]+/g, '_')
    .replace(/_+/g, '_')
    .toLowerCase();
}

async function submitFeedback(action) {
  const text = document.getElementById('feedback-text')?.value || '';
  const msg = document.getElementById('feedback-msg');
  try {
    const resp = await fetch(apiPath('feedback'), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action, feedback: text }),
    });
    const data = await resp.json();
    if (msg) msg.textContent = data.message || data.error || 'Done';
  } catch (e) {
    if (msg) msg.textContent = 'Error: ' + e.message;
  }
}

// --- Pan & zoom for DAG ---
(function() {
  const svgEl = document.getElementById('dag-svg');
  const pane = document.getElementById('dag-pane');
  let viewBox = { x: 0, y: 0, w: 800, h: 600 };
  let isPanning = false, startPt = null, startVB = null;
  let lastPinchDist = 0;

  function updateViewBox() {
    svgEl.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  }

  // Observe when DAG re-renders to capture the initial viewBox
  const observer = new MutationObserver(() => {
    const vb = svgEl.getAttribute('viewBox');
    if (vb) {
      const [x, y, w, h] = vb.split(' ').map(Number);
      if (w > 0 && h > 0) { viewBox = { x, y, w, h }; }
    }
  });
  observer.observe(svgEl, { attributes: true, attributeFilter: ['viewBox'] });

  // Mouse wheel zoom
  pane.addEventListener('wheel', (e) => {
    e.preventDefault();
    const scale = e.deltaY > 0 ? 1.1 : 0.9;
    const rect = svgEl.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width;
    const my = (e.clientY - rect.top) / rect.height;
    const newW = viewBox.w * scale, newH = viewBox.h * scale;
    viewBox.x += (viewBox.w - newW) * mx;
    viewBox.y += (viewBox.h - newH) * my;
    viewBox.w = newW; viewBox.h = newH;
    updateViewBox();
  }, { passive: false });

  // Mouse drag pan
  pane.addEventListener('mousedown', (e) => {
    if (e.target.closest('.node')) return; // don't pan when clicking nodes
    isPanning = true;
    startPt = { x: e.clientX, y: e.clientY };
    startVB = { ...viewBox };
    pane.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    const rect = svgEl.getBoundingClientRect();
    const dx = (e.clientX - startPt.x) / rect.width * viewBox.w;
    const dy = (e.clientY - startPt.y) / rect.height * viewBox.h;
    viewBox.x = startVB.x - dx;
    viewBox.y = startVB.y - dy;
    updateViewBox();
  });
  window.addEventListener('mouseup', () => { isPanning = false; pane.style.cursor = ''; });

  // ----- Detail-pane resizer -----
  // Drag the vertical handle between the DAG and detail panes to resize.
  // Width persists in localStorage. Double-click resets to the default.
  const DETAIL_WIDTH_STORAGE_KEY = 'trellis.viewer.detailPaneWidth';
  const DETAIL_WIDTH_DEFAULT = 420;
  const DETAIL_WIDTH_MIN = 220;
  const DETAIL_WIDTH_MAX_MARGIN = 360; // leave this much room for the DAG

  function applyDetailWidth(px) {
    const clamped = Math.max(
      DETAIL_WIDTH_MIN,
      Math.min(window.innerWidth - DETAIL_WIDTH_MAX_MARGIN, px),
    );
    document.body.style.setProperty('--detail-pane-width', clamped + 'px');
    return clamped;
  }

  function readSavedDetailWidth() {
    try {
      const raw = localStorage.getItem(DETAIL_WIDTH_STORAGE_KEY);
      const parsed = raw ? Number(raw) : NaN;
      if (Number.isFinite(parsed) && parsed > 0) return parsed;
    } catch {}
    return DETAIL_WIDTH_DEFAULT;
  }

  applyDetailWidth(readSavedDetailWidth());

  const resizer = document.getElementById('detail-resizer');
  if (resizer) {
    let dragStartX = 0;
    let dragStartWidth = 0;
    let dragging = false;

    const onMove = (e) => {
      if (!dragging) return;
      const clientX = e.clientX != null ? e.clientX : (e.touches && e.touches[0] && e.touches[0].clientX);
      if (clientX == null) return;
      // Handle sits between dag-pane and detail-pane. Moving left grows the
      // detail-pane, right shrinks it — so subtract the delta.
      const delta = clientX - dragStartX;
      applyDetailWidth(dragStartWidth - delta);
      e.preventDefault();
    };
    const onUp = () => {
      if (!dragging) return;
      dragging = false;
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      try {
        const current = document.body.style.getPropertyValue('--detail-pane-width') || (DETAIL_WIDTH_DEFAULT + 'px');
        localStorage.setItem(DETAIL_WIDTH_STORAGE_KEY, String(parseInt(current, 10) || DETAIL_WIDTH_DEFAULT));
      } catch {}
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
    const onDown = (e) => {
      dragging = true;
      resizer.classList.add('dragging');
      const clientX = e.clientX != null ? e.clientX : (e.touches && e.touches[0] && e.touches[0].clientX);
      dragStartX = clientX || 0;
      const styleVal = document.body.style.getPropertyValue('--detail-pane-width') || (DETAIL_WIDTH_DEFAULT + 'px');
      dragStartWidth = parseInt(styleVal, 10) || DETAIL_WIDTH_DEFAULT;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('touchend', onUp);
      e.preventDefault();
    };
    resizer.addEventListener('mousedown', onDown);
    resizer.addEventListener('touchstart', onDown, { passive: false });
    resizer.addEventListener('dblclick', () => {
      applyDetailWidth(DETAIL_WIDTH_DEFAULT);
      try {
        localStorage.removeItem(DETAIL_WIDTH_STORAGE_KEY);
      } catch {}
    });
    // Re-clamp on viewport changes (e.g. rotation, resize) so we never eat
    // the whole width.
    window.addEventListener('resize', () => {
      const cur = parseInt(document.body.style.getPropertyValue('--detail-pane-width'), 10) || DETAIL_WIDTH_DEFAULT;
      applyDetailWidth(cur);
    });
  }

  // Touch: pinch zoom + pan
  function pinchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  function touchCenter(touches) {
    return {
      x: (touches[0].clientX + touches[1].clientX) / 2,
      y: (touches[0].clientY + touches[1].clientY) / 2,
    };
  }

  pane.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1 && !e.target.closest('.node')) {
      isPanning = true;
      startPt = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      startVB = { ...viewBox };
    } else if (e.touches.length === 2) {
      isPanning = false;
      lastPinchDist = pinchDist(e.touches);
      startVB = { ...viewBox };
    }
  }, { passive: true });

  pane.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1 && isPanning) {
      e.preventDefault();
      const rect = svgEl.getBoundingClientRect();
      const dx = (e.touches[0].clientX - startPt.x) / rect.width * startVB.w;
      const dy = (e.touches[0].clientY - startPt.y) / rect.height * startVB.h;
      viewBox.x = startVB.x - dx;
      viewBox.y = startVB.y - dy;
      updateViewBox();
    } else if (e.touches.length === 2) {
      e.preventDefault();
      const dist = pinchDist(e.touches);
      const scale = lastPinchDist / dist;
      const rect = svgEl.getBoundingClientRect();
      const c = touchCenter(e.touches);
      const mx = (c.x - rect.left) / rect.width;
      const my = (c.y - rect.top) / rect.height;
      const newW = startVB.w * scale, newH = startVB.h * scale;
      viewBox.x = startVB.x + (startVB.w - newW) * mx;
      viewBox.y = startVB.y + (startVB.h - newH) * my;
      viewBox.w = newW; viewBox.h = newH;
      updateViewBox();
    }
  }, { passive: false });

  pane.addEventListener('touchend', () => { isPanning = false; });
})();

// ---------------------------------------------------------------------------
// "Auto-refresh" toggle (global, persists in localStorage; default ON).
// When OFF: the 30s polling timer is cleared so the viewer's data stays
// frozen at the last successful fetch. Useful for inspecting a particular
// snapshot without the page mutating under you. The Refresh button next to
// the toggle still works for one-shot manual reloads.
// ---------------------------------------------------------------------------
const AUTO_REFRESH_STORAGE_KEY = 'trellis.viewer.autoRefresh';
const AUTO_REFRESH_INTERVAL_MS = 30000;
function readAutoRefresh() {
  try {
    const raw = localStorage.getItem(AUTO_REFRESH_STORAGE_KEY);
    if (raw === '0' || raw === 'false') return false;
  } catch {}
  return true;  // default ON
}
let autoRefreshEnabled = readAutoRefresh();
let autoRefreshTimer = null;
function startAutoRefreshTimer() {
  if (autoRefreshTimer) return;
  autoRefreshTimer = setInterval(fetchData, AUTO_REFRESH_INTERVAL_MS);
}
function stopAutoRefreshTimer() {
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
}
function setAutoRefresh(value) {
  const next = !!value;
  if (next === autoRefreshEnabled) return;
  autoRefreshEnabled = next;
  try { localStorage.setItem(AUTO_REFRESH_STORAGE_KEY, next ? '1' : '0'); } catch {}
  const cb = document.getElementById('auto-refresh-checkbox');
  if (cb) cb.checked = next;
  if (next) startAutoRefreshTimer(); else stopAutoRefreshTimer();
}
(function syncAutoRefreshCheckbox() {
  const cb = document.getElementById('auto-refresh-checkbox');
  if (cb) cb.checked = autoRefreshEnabled;
})();

// Initial fetch is always one-shot; the 30s timer only fires when the
// auto-refresh toggle is ON.
fetchData();
if (autoRefreshEnabled) startAutoRefreshTimer();

// ---------------------------------------------------------------------------
// External-codex tracker (hidden feature).
// Ctrl+Shift+E flips a server-side flag at <stateDir>/external_codex.json.
// While ON, the current cycle and every cycle reached before the flag is
// flipped OFF are added to a "tainted" list — those cycles' burn deltas are
// confounded by codex usage outside this project, so the β-fitter
// (scripts/fit_codex_burn_beta.py) can later drop them. A small badge
// appears bottom-left while the flag is ON; clicking the badge flips it
// off as well. Hidden by design — no menu entry, no settings switch.
// ---------------------------------------------------------------------------
let externalCodexState = null;
async function fetchExternalCodex() {
  try {
    const r = await fetch(apiPath('external-codex.json'));
    if (!r.ok) return;
    externalCodexState = await r.json();
    renderExternalCodexIndicator();
  } catch { /* silent */ }
}
async function toggleExternalCodex() {
  try {
    const r = await fetch(apiPath('external-codex/toggle'), { method: 'POST' });
    if (!r.ok) return;
    externalCodexState = await r.json();
    renderExternalCodexIndicator();
  } catch { /* silent */ }
}
function renderExternalCodexIndicator() {
  let el = document.getElementById('external-codex-indicator');
  if (!externalCodexState || !externalCodexState.active) {
    if (el) el.remove();
    return;
  }
  if (!el) {
    el = document.createElement('div');
    el.id = 'external-codex-indicator';
    el.style.cssText = 'position:fixed; bottom:8px; left:8px; z-index:9999;'
      + ' padding:5px 10px; background:#ff6e40; color:#1e1f29;'
      + ' font-weight:bold; font-size:11px; border-radius:4px;'

    el.addEventListener('click', toggleExternalCodex);
    document.body.appendChild(el);
  }
  const since = externalCodexState.since_cycle;
  const cur = externalCodexState.current_cycle;
  el.textContent = (since != null && cur != null && since !== cur)
    ? `EXT CODEX • cycles ${since}–${cur}`
    : `EXT CODEX • cycle ${cur ?? since ?? '?'}`;
}
document.addEventListener('keydown', (ev) => {
  if (!ev.ctrlKey || !ev.shiftKey) return;
  if (ev.key !== 'E' && ev.key !== 'e') return;
  // Don't intercept when the user is typing into a real input.
  const t = ev.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
  ev.preventDefault();
  toggleExternalCodex();
});
fetchExternalCodex();
setInterval(fetchExternalCodex, 30_000);

// Fail-loudly halt banner. The kernel persists
// `<runtime>/checker_disagreement_halt.json` when its dual-collector
// local-closure probe detects a primary-vs-axcheck disagreement. The
// banner stays up until the operator deletes the marker.
async function fetchHaltState() {
  try {
    const r = await fetch(apiPath('halt-state.json'));
    if (!r.ok) return;
    const s = await r.json();
    const el = document.getElementById('halt-banner');
    if (!el) return;
    if (!s || !s.halted) {
      el.style.display = 'none';
      el.innerHTML = '';
      return;
    }
    const marker = s.marker || {};
    const node = marker.active_node ? String(marker.active_node) : '(unknown)';
    const cycle = (marker.cycle !== undefined && marker.cycle !== null) ? marker.cycle : '?';
    const markerPath = s.marker_path ? String(s.marker_path) : '<runtime>/checker_disagreement_halt.json';
    el.style.display = 'block';
    el.innerHTML =
      '<div>HALTED — checker disagreement on node <code>' + node +
      '</code> (cycle ' + cycle + '). Supervisor will not dispatch new bursts.</div>' +
      '<div style="font-weight:normal;font-size:12px;margin-top:4px">Marker: <code>' +
      markerPath + '</code>. Inspect for diagnostics + clear instructions; delete the file to resume.</div>';
  } catch (e) { /* polling is best-effort */ }
}
fetchHaltState();
setInterval(fetchHaltState, 30_000);
</script>
</body>
</html>
