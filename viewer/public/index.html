// reach here: out-of-math `<a class="noderef" data-target="...">`
// (emitted by the preprocessor) and in-math `<a href="noderef:...">`
// (emitted by KaTeX from the `\noderef` macro). Both route to
// selectNode().
document.addEventListener('click', (ev) => {
  const root = ev.target && ev.target.closest && ev.target.closest('.rendered-tex');
  if (!root) return;
  const link = ev.target.closest('a.noderef, a[href^="noderef:"]');
  if (!link) return;
  ev.preventDefault();
  ev.stopPropagation();  // don't toggle the collapsible while clicking
  let target = link.getAttribute('data-target');
  if (!target) {
    const href = link.getAttribute('href') || '';
    target = href.startsWith('noderef:') ? href.slice('noderef:'.length) : '';
  }
  if (target && allNodes && allNodes[target]) {
    selectNode(target);
  }
});

function renderNodeDetailSignature(name, node) {
  if (!node) return `${name}::missing`;
  const v = node.verification || {};
  return [
    name, node.kind, node.difficulty, node.hasSorry ? '1' : '0',
    (node.imports || []).join(','),
    // Include the include-defs flag and the rewired imports so the cached
    // signature changes when the toggle flips (Imports field swaps from raw
    // to rewired). Otherwise lastNodeRenderKey would suppress the rerender.
    includeDefs ? 'D+' : 'D-',
    getVisibleImports(name).join(','),
    v.correspondence || '', v.nl_proof || '', v.substantiveness || '',
    (v.correspondence_issue || '').length, (v.nl_proof_issue || '').length,
    (node.declaration || '').length, (node.texContent || '').length, (node.leanContent || '').length,
    // Toggle state participates in the signature so flipping the
    // Rendered-TeX checkbox forces a re-render.
    isRenderedTexEnabled() ? 'tex:rendered' : 'tex:raw',
  ].join('|');
}

function renderNodeDetail(name) {
  const pane = document.getElementById('detail-content');
  const node = allNodes[name];
  // Heavy text fields (leanContent / texContent / declaration) are
  // lazy-fetched. If they're missing, kick the fetch and re-render once
  // it lands. The first render below shows empty fields until then.
  if (node
      && !node.leanContent && !node.texContent && !node.declaration
      && currentState && currentState.node_content_inline === false) {
    const cycleAtFetch = currentCycleForContent();
    fetchNodeContent(name).then(() => {
      // Bail if the user navigated away or the cycle changed.
      if (selectedNode !== name) return;
      if (currentCycleForContent() !== cycleAtFetch) return;
      // Force a re-render: clear the render-signature cache so the
      // content-bearing pass isn't suppressed.
      lastNodeRenderKey = null;
      renderNodeDetail(name);
    }).catch(() => {});
  }
  // If we previously rendered something OTHER than node detail (e.g.,
  // the Progress / Usage / Kernel / Chat shells), the pane no longer
  // contains a node-detail tree. Detect that and force a fresh render
  // so the user gets the node view back when they click "Node".
  if (lastNodeRenderKey && !pane.querySelector('h2')) {
    lastNodeRenderKey = null;
  }
  if (!node) {
    if (lastNodeRenderKey !== `${name}::missing`) {
      pane.innerHTML = '<h2>Node not found</h2>';
      lastNodeRenderKey = `${name}::missing`;
    }
    return;
  }
  const sig = renderNodeDetailSignature(name, node);
  if (lastNodeRenderKey === sig) {
    // Nothing changed — leave the DOM (and any expanded collapsibles +
    // scroll position) alone.
    return;
  }
  const uiSnap = captureNodeDetailUiState();
  const committedStatus = isCommittedClosed(name, allNodes) ? 'closed' : 'open';

  const statusColor = {
    'closed': '#4a9eff',
    'open': '#6272a4',
  }[committedStatus] || '#6272a4';

  // Stable IDs on every collapsible so captureNodeDetailUiState/
  // restoreNodeDetailUiState can re-apply expanded state on data refresh.
  const cid = (key) => `collapse-${name}-${key}`;

  pane.innerHTML = `
    <h2 style="color:${statusColor}">${node.title || name}</h2>
    <div class="field">
      <div class="field-label">Name</div>
      <div class="field-value">${name}</div>
    </div>
    <div class="field">
      <div class="field-label">Status</div>
      <div class="field-value" style="color:${statusColor}">${committedStatus} (${node.kind})</div>
    </div>
    <div class="field">
      <div class="field-label">Imports${includeDefs ? '' : ' (rewired, defs hidden)'}</div>
      <div class="field-value">${
        (includeDefs ? (node.imports || []) : getVisibleImports(name)).join(', ') || 'none'
      }</div>
    </div>
    <div class="field">
      <div class="field-label">Difficulty</div>
      <div class="field-value">${node.difficulty || '?'}</div>
    </div>
    <div class="field">
      <div class="field-label">Sorry</div>
      <div class="field-value">${node.hasSorry ? '⚠ yes' : '✓ no'}</div>
    </div>
    ${node.verification ? `<div class="field">
      <div class="field-label">Verification</div>
      <div class="field-value">${
        (node.verification.correspondence === 'fail' ? '<span style="color:#ff5555">Correspondence: FAIL</span>' :
         node.verification.correspondence === 'pass' ? '<span style="color:#50fa7b">Correspondence: PASS</span>' : 'Correspondence: ?') +
        // Only render Substantiveness if the lane is present in this project's
        // protocol_state (older runs predate the substantiveness lane and the
        // adapter omits the field for them).
        (node.verification.substantiveness !== undefined ? '<br>' +
          (node.verification.substantiveness === 'fail' ? '<span style="color:#ff5555">Substantiveness: FAIL</span>' :
           node.verification.substantiveness === 'pass' ? '<span style="color:#50fa7b">Substantiveness: PASS</span>' : 'Substantiveness: ?') : '') +
        '<br>' +
        (node.verification.nl_proof === 'structural' ? '<span style="color:#ff5555">NL Proof: STRUCTURAL</span>' :
         node.verification.nl_proof === 'fail' ? '<span style="color:#ff5555">NL Proof: FAIL</span>' :
         node.verification.nl_proof === 'pass' ? '<span style="color:#50fa7b">NL Proof: PASS</span>' : 'NL Proof: ?') +
        // "Lean closed" indicator: same color scheme as the lane verdicts —
        // green when the lean file compiles without sorry, red otherwise.
        '<br>' +
        (committedStatus === 'closed'
          ? '<span style="color:#50fa7b">Lean closed: YES</span>'
          : '<span style="color:#ff5555">Lean closed: NO</span>')
      }</div>
      ${node.verification.correspondence_issue ? `<div id="${cid('corr-issue')}" class="field-value collapsible" onclick="this.classList.toggle('expanded')" style="color:#ff5555;font-size:11px;margin-top:4px">${escHtml(node.verification.correspondence_issue)}</div>` : ''}
      ${node.verification.nl_proof_issue ? `<div id="${cid('sound-issue')}" class="field-value collapsible" onclick="this.classList.toggle('expanded')" style="color:#ff5555;font-size:11px;margin-top:4px">${escHtml(node.verification.nl_proof_issue)}</div>` : ''}
    </div>` : ''}
    <!-- Five collapsible content sections. Default-open: NL statement only.
         Each <details> uses .node-section styling (arrow on same line as
         heading, click summary to toggle). Stable IDs let
         captureNodeDetailUiState/restoreNodeDetailUiState preserve open
         state across re-renders. -->
    <details class="node-section" id="${cid('sec-imports')}">
      <summary>Lean Imports</summary>
      <div class="field-value">${
        ((includeDefs ? (node.imports || []) : getVisibleImports(name)).join('\n')) || '(none)'
      }</div>
    </details>
    <details class="node-section" id="${cid('sec-nl-stmt')}" open>
      <summary>NL statement
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;text-transform:none;color:#8be9fd;font-size:10px;margin-left:auto">
          <input type="checkbox" id="${cid('tex-toggle')}" ${isRenderedTexEnabled() ? 'checked' : ''} onclick="event.stopPropagation()" onchange="setRenderedTexEnabled(this.checked)" style="cursor:pointer;margin:0">
          <span>Rendered</span>
        </label>
      </summary>
      ${renderTexFieldValueHtml(cid('nl-stmt'), extractTexStatement(node.texContent || ''))}
    </details>
    <details class="node-section" id="${cid('sec-lean-stmt')}">
      <summary>Lean statement</summary>
      <div class="field-value" style="color:#f8f8f2">${escHtml(extractLeanStatement(node.leanContent || '') || '(none)')}</div>
    </details>
    <details class="node-section" id="${cid('sec-nl-proof')}">
      <summary>NL proof</summary>
      ${renderTexFieldValueHtml(cid('nl-proof'), extractTexProof(node.texContent || ''))}
    </details>
    <details class="node-section" id="${cid('sec-lean-proof')}">
      <summary>Lean Proof</summary>
      <div class="field-value" style="color:#f8f8f2">${escHtml(extractLeanProof(node.leanContent || '') || '(none)')}</div>
    </details>
    <!-- Semantic closure: Tablet nodes that enter the seed's
         lean_semantic_closure walk. For theorem-kind seeds only the
         TYPE is walked (proof body is excluded); for definition seeds
         both type and value. Lazy-fetched on first expand; cached
         client-side so auto-refresh re-renders don't reset to loading. -->
    <details class="node-section" id="${cid('sec-sem-closure')}">
      <summary>Semantic closure</summary>
      <div id="${cid('sem-closure-body')}" class="field-value" style="color:#6272a4">${
        renderSemanticClosureBody(name) || 'click to load'
      }</div>
    </details>
  `;
  // Wire the lazy fetch. Uses an ID-based handler so re-renders don't
  // detach the body element from the closure. The result is cached in
  // `semanticClosureCache` (keyed on cycle+node) so the next renderNodeDetail
  // can populate the body synchronously without re-fetching.
  {
    const sec = document.getElementById(cid('sec-sem-closure'));
    if (sec) {
      sec.addEventListener('toggle', () => {
        if (!sec.open) return;
        loadSemanticClosure(name, cid('sem-closure-body'));
      });
      // If the user opens the section via restoreNodeDetailUiState (state
      // preserved across an auto-refresh) AND we already had a cached
      // value, the body was already populated synchronously above — no
      // fetch needed. If the section opens and we DON'T have a cached
      // value, the toggle event will kick the fetch.
      if (sec.open) loadSemanticClosure(name, cid('sem-closure-body'));
    }
  }
  restoreNodeDetailUiState(uiSnap);
  // If the Rendered-TeX toggle is on, run KaTeX over the two tex
  // containers (NL statement + NL proof). This is a no-op when the
  // toggle is off (each field contains plain escaped text and
  // renderTexInto is never called).
  if (isRenderedTexEnabled()) {
    const stmtEl = document.getElementById(cid('nl-stmt'));
    if (stmtEl) renderTexInto(stmtEl, extractTexStatement(node.texContent || ''));
    const proofEl = document.getElementById(cid('nl-proof'));
    if (proofEl) renderTexInto(proofEl, extractTexProof(node.texContent || ''));
  }
  lastNodeRenderKey = sig;
}

// =====================================================================
// Progress / Usage / Kernel tabs.
// All three follow the "build shell once, refresh content sub-tree only"
// pattern (mirrors Chats) so the periodic refresh never nukes the pane
// and never resets scroll/expanded state.
// =====================================================================

let progressShellBuilt = false;
let usageShellBuilt = false;
let kernelShellBuilt = false;
let kernelAutoRefreshTimer = null;
let lastUsageDataKey = null;
let lastProgressDataKey = null;
const PROGRESS_PHASE_VIEW_STORAGE_KEY = 'trellis.viewer.progressPhaseView';
function readProgressPhaseView() {
  try {
    const raw = localStorage.getItem(PROGRESS_PHASE_VIEW_STORAGE_KEY);
    if (raw === 'current') return 'current';
  } catch {}
  return 'all';
}
let progressPhaseView = readProgressPhaseView();

function progressPhaseLabel(phase) {
  const p = String(phase || '').trim();
  if (!p) return 'current phase';
  if (/formalization/i.test(p)) return 'formalization';
  if (/theorem/i.test(p)) return 'theorem stating';
  if (/cleanup/i.test(p)) return 'cleanup';
  return p
    .replace(/_/g, ' ')
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .toLowerCase();
}

function latestProgressPhase(checkpoints) {
  for (let i = checkpoints.length - 1; i >= 0; i--) {
    const phase = String(checkpoints[i].phase || '').trim();
    if (phase) return phase;
  }
  return '';
}

function setProgressPhaseView(value) {
  const next = value === 'current' ? 'current' : 'all';
  if (next === progressPhaseView) return;
  progressPhaseView = next;
  try { localStorage.setItem(PROGRESS_PHASE_VIEW_STORAGE_KEY, next); } catch {}
  lastProgressDataKey = null;
  renderProgressDetail();
}

function fmtSecondsToHm(s) {
  if (!s || !isFinite(s)) return '0';
  if (s < 60) return `${s.toFixed(0)}s`;
  if (s < 3600) return `${(s / 60).toFixed(1)}m`;
  return `${(s / 3600).toFixed(2)}h`;
}
function fmtTokens(n) {
  if (!n || !isFinite(n)) return '0';
  if (n >= 1e6) return `${(n / 1e6).toFixed(2)}M`;
  if (n >= 1e3) return `${(n / 1e3).toFixed(1)}K`;
  return `${n}`;
}
function fmtUsd(x) {
  if (!x || !isFinite(x)) return '—';
  return `$${x.toFixed(2)}`;
}

// ---------- Progress ----------

async function renderProgressDetail() {
  const pane = document.getElementById('detail-content');
  if (progressShellBuilt && !document.getElementById('progress-charts')) {
    progressShellBuilt = false;
    lastProgressDataKey = null;  // force a re-paint of the new shell
  }
  if (!progressShellBuilt) {
    pane.innerHTML = `
      <h2>Progress</h2>
      <p style="color:#6272a4;font-size:12px">
        Per-checkpoint trends. Each line is a metric over the run's
        commit history. Refreshes on the DAG cadence (~30s).
      </p>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <label for="progress-phase-view-select" style="color:#8be9fd;font-size:12px">View:</label>
        <select id="progress-phase-view-select" onchange="setProgressPhaseView(this.value)"
          style="background:#0f0f23;color:#e0e0e0;border:1px solid #444;border-radius:4px;padding:4px 8px;font-size:12px">
          <option value="all">Whole process</option>
          <option value="current">Current phase</option>
        </select>
        <span id="progress-phase-view-note" style="color:#6272a4;font-size:11px"></span>
      </div>
      <div id="progress-status" style="color:#6272a4;font-size:11px;margin-bottom:8px">Loading…</div>
      <div id="progress-charts" style="display:flex;flex-direction:column;gap:16px"></div>
    `;
    progressShellBuilt = true;
  }
  try {
    const r = await fetch(apiPath('progress.json'));
    if (!r.ok) throw new Error(`progress.json -> ${r.status}`);
    const d = await r.json();
    const cps = d.checkpoints || [];
    const currentPhase = latestProgressPhase(cps);
    const viewCps = progressPhaseView === 'current' && currentPhase
      ? cps.filter((c) => String(c.phase || '').trim() === currentPhase)
      : cps;
    const allKey = includeDefs ? 'all' : 'all_proofs_only';
    const key = viewCps.length
      ? `${progressPhaseView}::${currentPhase}::${viewCps.length}::${viewCps[viewCps.length - 1].sha}::${allKey}`
      : `${progressPhaseView}::${currentPhase}::empty::${allKey}`;
    if (key === lastProgressDataKey) return;
    lastProgressDataKey = key;
    const select = document.getElementById('progress-phase-view-select');
    if (select) select.value = progressPhaseView;
    const currentPhaseLabel = progressPhaseLabel(currentPhase);
    const currentOpt = select && select.querySelector('option[value="current"]');
    if (currentOpt) currentOpt.textContent = `Current phase (${currentPhaseLabel})`;
    const note = document.getElementById('progress-phase-view-note');
    if (note) {
      note.textContent = progressPhaseView === 'current'
        ? `showing ${currentPhaseLabel} only`
        : 'showing whole process';
    }
    document.getElementById('progress-status').textContent =
      `${viewCps.length} of ${cps.length} checkpoints (cycles ${viewCps.length ? viewCps[0].cycle : '?'} — ${viewCps.length ? viewCps[viewCps.length - 1].cycle : '?'})${includeDefs ? '' : ' · proofs only'}`;
    const charts = document.getElementById('progress-charts');
    charts.innerHTML = '';
    // Nodes chart: keep total/corr/subst/sound, drop the lean-closed
    // pair, add `unclosed` first in the list so it z-layers underneath
    // the other curves where they overlap.
    charts.appendChild(buildProgressChartCard(
      `Nodes${includeDefs ? '' : ' (excluding definitions)'}`,
      viewCps,
      allKey,
      ['unclosed', 'total', 'corr', 'subst', 'sound'],
    ));
    // Proofs chart: NL word curves only. `leanProofChars` is hidden
    // for now — the 2026-05-12 FILESPEC v2 deploy revealed that the
    // pre-marker `lastIndexOf(':=')` extractor was systematically
    // under-counting (proof bodies contain `have x :=` / `let y :=`
    // so the heuristic returned only the tail after the last token).
    // The new -- BODY scan is correct, but the curve now has a huge
    // 2026-05-12 discontinuity at cycle 695 that drowns the chart;
    // hide until we decide whether to re-extract historical
    // checkpoints or just amputate pre-fix data.
    charts.appendChild(buildProgressChartCard(
      `Proofs${includeDefs ? '' : ' (excluding definitions)'}`,
      viewCps,
      allKey,
      ['nlProofUnclosedWords', 'nlProofWords'],
    ));
    charts.appendChild(buildProgressChartCard(
      `Coarse-DAG progress${includeDefs ? '' : ' (excluding definitions)'}`,
      viewCps,
      includeDefs ? 'coarse_shallow' : 'coarse_shallow_proofs_only',
      ['coarseUnclosed', 'total'],
    ));
    charts.appendChild(buildProgressChartCard(
      'Task blockers',
      viewCps,
      'task_blockers',
      ['taskBlockers', 'taskPaper', 'taskCorr', 'taskSubst', 'taskSound'],
    ));
  } catch (e) {
    document.getElementById('progress-status').textContent = `Load failed: ${e.message}`;
  }
}

const PROGRESS_SERIES = {
  total:    { color: '#bd93f9', label: 'total' },
  corr:     { color: '#8be9fd', label: 'corr-pass' },
  subst:    { color: '#ffb86c', label: 'subst-pass' },
  sound:    { color: '#f1fa8c', label: '[sound/waived, not-definitively-failing]', band: true },
  closed:   { color: '#50fa7b', label: 'lean-closed (shallow)' },
  closedTr: { color: '#ff79c6', label: 'lean-closed (recursive)' },
  unclosed:   { color: '#50fa7b', label: 'lean-unclosed' },
  unclosedTr: { color: '#ff79c6', label: 'lean-unclosed (recursive)' },
  // Coarse-DAG-chart-specific aliases of `closed` / `unclosed`. Same colors
  // and data accessors (read `lean_closed` from the bucket) but cleaner
  // labels — the (shallow)/(recursive) contrast on the Nodes chart isn't
  // meaningful here because the coarse chart doesn't plot the recursive
  // counterpart, so the parenthetical reads as clutter.
  coarseClosed: { color: '#50fa7b', label: 'lean-closed' },
  coarseUnclosed: { color: '#50fa7b', label: 'lean-unclosed' },
  leanProofChars: { color: '#ff79c6', label: 'lean proof chars' },
  taskBlockers: { color: '#bd93f9', label: 'task blockers' },
  taskPaper: { color: '#ff5555', label: 'paper' },
  taskCorr: { color: '#8be9fd', label: 'corr' },
  taskSubst: { color: '#ffb86c', label: 'subst' },
  taskSound: { color: '#f1fa8c', label: 'sound' },
  // NL word counts run an order of magnitude larger than lean chars,
  // so they live on the right y-axis when charted together with
  // leanProofChars. The chart code reads `axis: 'right'` to opt a
  // series into the right-side scale. Colors (yellow / green) mirror
  // the corresponding "total" / "unclosed" pair on the Nodes chart so
  // the eye can carry the same color semantics across both panels.
  nlProofWords: { color: '#f1fa8c', label: 'All NL proof words', axis: 'right' },
  nlProofUnclosedWords: { color: '#50fa7b', label: 'NL proof words in nodes not yet lean-closed', axis: 'right' },
};
const DEFAULT_PROGRESS_SERIES = ['total', 'corr', 'subst', 'sound', 'closed', 'closedTr'];

function buildProgressChartCard(title, checkpoints, key, seriesKeys = DEFAULT_PROGRESS_SERIES) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'background:#0b0b1e;border:1px solid #333;border-radius:6px;padding:10px';
  const legend = seriesKeys
    .map((name) => PROGRESS_SERIES[name])
    .filter(Boolean)
    .map((s) => `<span><span style="color:${s.color}">■</span> ${escHtml(s.label)}</span>`)
    .join('');
  wrap.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">
      <div style="color:#8be9fd;font-weight:bold">${escHtml(title)}</div>
      <div style="font-size:11px;color:#6272a4;display:flex;gap:10px;flex-wrap:wrap">
        ${legend}
      </div>
    </div>
  `;
  wrap.appendChild(buildLineChartSvg(checkpoints, key, seriesKeys));
  return wrap;
}

function buildLineChartSvg(checkpoints, key, seriesKeys = DEFAULT_PROGRESS_SERIES) {
  // padR is always reserved at the right-axis width (38) so charts with
  // and without a right axis share the same plot-area pixel range. This
  // keeps the x-axis cycle positions horizontally aligned across the
  // Nodes / Proofs / Task-blockers cards regardless of which ones happen
  // to use the right axis.
  const W = 720, H = 220, padL = 38, padR = 38, padT = 10, padB = 24;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  // For the coarse chart, omit checkpoints where the kernel hadn't populated
  // coarse_dag_nodes yet (theorem-stating phase, post-restructure transitions).
  // The server marks those by omitting the `coarse` field entirely; we treat
  // values as `null` and the path() helper breaks the line at gaps.
  function valueAt(c) {
    const bucket = c[key];
    if (bucket === undefined || bucket === null) return null;
    return bucket;
  }
  const series = {
    total:    { color: PROGRESS_SERIES.total.color, values: checkpoints.map((c) => { const b = valueAt(c); return b ? (b.total || 0) : null; }) },
    corr:     { color: PROGRESS_SERIES.corr.color, values: checkpoints.map((c) => { const b = valueAt(c); return b ? (b.corr_passing || 0) : null; }) },
    // Substantiveness — null on pre-lane checkpoints, so the line breaks
    // there rather than misleadingly drawing a flat zero. `?? null`
    // preserves an explicit null from the server (vs `||` which would
    // collapse a valid 0 to null).
    subst:    { color: PROGRESS_SERIES.subst.color, values: checkpoints.map((c) => { const b = valueAt(c); return b ? (b.substantiveness_passing ?? null) : null; }) },
    sound:    {
      color: PROGRESS_SERIES.sound.color,
      values: checkpoints.map((c) => { const b = valueAt(c); return b ? (b.sound_or_waived || 0) : null; }),
      // Upper edge: total nodes not "definitively failing" soundness.
      // Definitively failing = (verifier-Fail in current form) ∪ (SKETCH-marked):
      //   - verifier-Fail in current form: most recent Sound verifier verdict
      //     was Fail/Structural AND that verdict's fingerprint matches the
      //     node's current sound fingerprint (no worker drift since).
      //   - SKETCH-marked: .tex proof block opens with literal `SKETCH:`.
      //     The supervisor auto-fails these whenever they are Sound-dispatched
      //     (`_maybe_synthesize_sketch_soundness_artifact` in
      //     trellis/agent_wrapper/executor.py); we count them here so the
      //     chart doesn't have to wait for held_target rotation to reach them.
      // Both signals are stable across reviewer task↔reset relabeling, so
      // the upper edge doesn't share the saw-tooth that `current_sound_state
      // == Fail` exhibits.
      //
      // Fallbacks: `sound_definitive_fail` (preferred) → `sound_verifier_fail`
      // → original (`sound_or_waived + sound_unknown`) when older cached
      // checkpoints lack either field. Each fallback widens the band toward
      // the legacy semantic, so the chart never breaks on stale data.
      valuesUpper: checkpoints.map((c) => {
        const b = valueAt(c);
        if (!b) return null;
        if (b.sound_definitive_fail !== undefined && b.sound_definitive_fail !== null) {
          return Math.max(0, (b.total || 0) - b.sound_definitive_fail);
        }
        if (b.sound_verifier_fail !== undefined && b.sound_verifier_fail !== null) {
          return Math.max(0, (b.total || 0) - b.sound_verifier_fail);
        }
        return (b.sound_or_waived || 0) + (b.sound_unknown || 0);
      }),
    },
    closed:   { color: PROGRESS_SERIES.closed.color, values: checkpoints.map((c) => { const b = valueAt(c); return b ? (b.lean_closed || 0) : null; }) },
    closedTr: { color: PROGRESS_SERIES.closedTr.color, values: checkpoints.map((c) => { const b = valueAt(c); return b ? (b.lean_closed_transitive || 0) : null; }) },
    coarseClosed: { color: PROGRESS_SERIES.coarseClosed.color, values: checkpoints.map((c) => { const b = valueAt(c); return b ? (b.lean_closed || 0) : null; }) },
    unclosed: { color: PROGRESS_SERIES.unclosed.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? Math.max(0, (b.total || 0) - (b.lean_closed || 0)) : null;
    }) },
    coarseUnclosed: { color: PROGRESS_SERIES.coarseUnclosed.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? Math.max(0, (b.total || 0) - (b.lean_closed || 0)) : null;
    }) },
    unclosedTr: { color: PROGRESS_SERIES.unclosedTr.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? Math.max(0, (b.total || 0) - (b.lean_closed_transitive || 0)) : null;
    }) },
    leanProofChars: { color: PROGRESS_SERIES.leanProofChars.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? (b.lean_proof_chars || 0) : null;
    }) },
    nlProofWords: { color: PROGRESS_SERIES.nlProofWords.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? (b.nl_proof_words || 0) : null;
    }) },
    nlProofUnclosedWords: { color: PROGRESS_SERIES.nlProofUnclosedWords.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? (b.nl_proof_unclosed_words || 0) : null;
    }) },
    taskBlockers: { color: PROGRESS_SERIES.taskBlockers.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? (b.total || 0) : null;
    }) },
    taskPaper: { color: PROGRESS_SERIES.taskPaper.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? (b.paper || 0) : null;
    }) },
    taskCorr: { color: PROGRESS_SERIES.taskCorr.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? (b.corr || 0) : null;
    }) },
    taskSubst: { color: PROGRESS_SERIES.taskSubst.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? (b.subst || 0) : null;
    }) },
    taskSound: { color: PROGRESS_SERIES.taskSound.color, values: checkpoints.map((c) => {
      const b = valueAt(c);
      return b ? (b.sound || 0) : null;
    }) },
  };
  const xs = checkpoints.map((c) => c.cycle || 0);
  // Per-series axis assignment from PROGRESS_SERIES.<name>.axis
  // (defaults to 'left'). Series with `axis: 'right'` get their own
  // right-side y scale so curves with very different magnitudes (e.g.
  // lean chars vs NL words) can share one chart legibly.
  const axisFor = (name) => (PROGRESS_SERIES[name] && PROGRESS_SERIES[name].axis) || 'left';
  const leftKeys = seriesKeys.filter((k) => series[k] && axisFor(k) === 'left');
  const rightKeys = seriesKeys.filter((k) => series[k] && axisFor(k) === 'right');
  const hasRight = rightKeys.length > 0;
  // padR already reserves right-axis room unconditionally (see top of
  // function), so the effective right padding is just padR. Keep the
  // padREff alias to minimize churn elsewhere in the function.
  const padREff = padR;
  const innerWEff = W - padL - padREff;
  const valsForKeys = (keys) => [].concat(...keys.map((k) => series[k].values)).filter((v) => v !== null);
  const leftMax = Math.max(1, ...(valsForKeys(leftKeys).length ? valsForKeys(leftKeys) : [0]));
  const rightMax = hasRight ? Math.max(1, ...valsForKeys(rightKeys)) : 0;
  // Shared visual range: both scales use the larger of the two axes'
  // maxes as their denominator, so curves on different axes are
  // visually comparable (the smaller-magnitude curve renders at the
  // proportionally smaller height it actually has). Each axis still
  // labels its own ticks in its own unit; the difference is that the
  // smaller axis's ticks no longer span the full chart height.
  const yMaxShared = hasRight ? Math.max(leftMax, rightMax) : leftMax;
  const xMin = xs.length ? xs[0] : 0, xMax = xs.length ? xs[xs.length - 1] : 1;
  const xScale = (x) => padL + (xMax === xMin ? innerWEff / 2 : ((x - xMin) / (xMax - xMin)) * innerWEff);
  const yScaleLeft = (y) => padT + (1 - y / yMaxShared) * innerH;
  const yScaleRight = (y) => padT + (1 - y / yMaxShared) * innerH;
  const yScaleFor = (k) => (axisFor(k) === 'right' ? yScaleRight : yScaleLeft);

  function path(values, yScale) {
    // Break the path at any null value so gaps in coverage render as
    // missing segments rather than dropping the line to zero.
    let out = '';
    let needM = true;
    for (let i = 0; i < values.length; i++) {
      const v = values[i];
      if (v === null) { needM = true; continue; }
      out += `${needM ? 'M' : 'L'} ${xScale(xs[i]).toFixed(1)} ${yScale(v).toFixed(1)} `;
      needM = false;
    }
    return out.trim();
  }

  // Tick values at 0, 1/4, 1/2, 3/4, max for each axis. Gridlines live
  // on the left axis only; the right axis just adds tick numbers at
  // the corresponding y positions (so reading both axes against the
  // same horizontal lines is visually consistent).
  const leftTicks = [0, Math.ceil(leftMax / 4), Math.ceil(leftMax / 2), Math.ceil(3 * leftMax / 4), leftMax];
  const rightTicks = hasRight ? [0, Math.ceil(rightMax / 4), Math.ceil(rightMax / 2), Math.ceil(3 * rightMax / 4), rightMax] : [];
  const xTickCount = Math.min(xs.length, 8);
  const xStep = xs.length > 1 ? Math.max(1, Math.floor((xs.length - 1) / xTickCount)) : 1;
  // Tick-label color matches the curve drawn on top (= last in
  // seriesKeys for that axis). The "last drawn" curve is the
  // visually-dominant one — e.g. nlProofWords drawn over
  // nlProofUnclosedWords on the right axis — so its color reads as
  // the axis's color.
  const NEUTRAL_TICK_COLOR = '#6272a4';
  const leftTickColor = leftKeys.length ? series[leftKeys[leftKeys.length - 1]].color : NEUTRAL_TICK_COLOR;
  const rightTickColor = hasRight ? series[rightKeys[rightKeys.length - 1]].color : NEUTRAL_TICK_COLOR;

  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;background:#0f0f23;border-radius:4px">`;
  // Y gridlines at the *shared* range's quartiles so they always span
  // the full chart height. Each axis's tick labels are then drawn at
  // the y-positions corresponding to that axis's own values (which
  // may be squashed below the top when its max is smaller than the
  // shared max).
  const sharedGridTicks = [0, yMaxShared / 4, yMaxShared / 2, 3 * yMaxShared / 4, yMaxShared];
  for (const t of sharedGridTicks) {
    const yy = yScaleLeft(t).toFixed(1);
    svg += `<line x1="${padL}" y1="${yy}" x2="${W - padREff}" y2="${yy}" stroke="#222a4d" stroke-width="1"/>`;
  }
  // Left axis tick labels (at positions of leftTicks within shared scale).
  // Skip when no left-axis series is in the chart — otherwise we'd render
  // a meaningless `[0, 0, 0, 0, 1]` ladder when every visible curve is on
  // the right axis.
  if (leftKeys.length) {
    for (const t of leftTicks) {
      svg += `<text x="${padL - 4}" y="${(yScaleLeft(t) + 4).toFixed(1)}" fill="${leftTickColor}" font-size="10" text-anchor="end" font-family="Menlo,monospace">${t}</text>`;
    }
  }
  // Right-axis tick labels (no extra gridlines — they share the
  // left-axis grid). Each right tick is drawn at the y position
  // corresponding to its proportion of rightMax (which lines up with
  // the matching proportion of leftMax on the same horizontal line).
  if (hasRight) {
    for (const t of rightTicks) {
      svg += `<text x="${(W - padREff + 4).toFixed(1)}" y="${(yScaleRight(t) + 4).toFixed(1)}" fill="${rightTickColor}" font-size="10" text-anchor="start" font-family="Menlo,monospace">${t}</text>`;
    }
  }
  // X ticks (cycle numbers)
  for (let i = 0; i < xs.length; i += xStep) {
    const xx = xScale(xs[i]).toFixed(1);
    svg += `<line x1="${xx}" y1="${padT}" x2="${xx}" y2="${H - padB}" stroke="#161e3a" stroke-width="1"/>`;
    svg += `<text x="${xx}" y="${H - padB + 12}" fill="#6272a4" font-size="10" text-anchor="middle" font-family="Menlo,monospace">${xs[i]}</text>`;
  }
  // Band path between a lower and upper value array. Walks forward along the
  // upper edge, then backward along the lower edge, closing the polygon.
  // Breaks the area into independent polygons at any index where either
  // edge is null, matching how `path()` breaks lines at gaps.
  function areaPath(lowerVals, upperVals, yScale) {
    let out = '';
    let lo = [], up = [];
    function flush() {
      if (up.length < 2) { lo = []; up = []; return; }
      let s = `M ${xScale(xs[up[0].i]).toFixed(1)} ${yScale(up[0].v).toFixed(1)} `;
      for (let k = 1; k < up.length; k++) {
        s += `L ${xScale(xs[up[k].i]).toFixed(1)} ${yScale(up[k].v).toFixed(1)} `;
      }
      for (let k = lo.length - 1; k >= 0; k--) {
        s += `L ${xScale(xs[lo[k].i]).toFixed(1)} ${yScale(lo[k].v).toFixed(1)} `;
      }
      s += 'Z ';
      out += s;
      lo = []; up = [];
    }
    for (let i = 0; i < xs.length; i++) {
      const a = lowerVals[i], b = upperVals[i];
      if (a === null || b === null) { flush(); continue; }
      lo.push({ i, v: a });
      up.push({ i, v: b });
    }
    flush();
    return out.trim();
  }

  // Lines (later in seriesKeys draws on top; each curve uses its
  // configured axis's scale). Series with a `valuesUpper` array render as
  // a filled band between values (lower) and valuesUpper (upper), with the
  // lower edge drawn as a stroke for emphasis.
  for (const k of seriesKeys) {
    if (!series[k]) continue;
    const yScale = yScaleFor(k);
    if (series[k].valuesUpper) {
      svg += `<path d="${areaPath(series[k].values, series[k].valuesUpper, yScale)}" fill="${series[k].color}" fill-opacity="0.22" stroke="none"/>`;
      svg += `<path d="${path(series[k].values, yScale)}" fill="none" stroke="${series[k].color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    } else {
      svg += `<path d="${path(series[k].values, yScale)}" fill="none" stroke="${series[k].color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
  }
  // Hover overlay: an initially hidden vertical guide + per-series
  // markers. The mousemove handler positions these and shows a floating
  // HTML tooltip alongside.
  const drawnSeriesKeys = seriesKeys.filter((k) => series[k]);
  svg += `<g class="chart-hover" style="display:none;pointer-events:none">`;
  svg += `<line class="chart-hover-line" x1="0" y1="${padT}" x2="0" y2="${H - padB}" stroke="#bd93f9" stroke-width="1" stroke-dasharray="3,3" opacity="0.85"/>`;
  for (const k of drawnSeriesKeys) {
    svg += `<circle class="chart-hover-dot" data-series="${k}" cx="0" cy="0" r="3" fill="${series[k].color}" stroke="#0f0f23" stroke-width="1"/>`;
  }
  svg += `</g>`;
  svg += `</svg>`;

  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:relative';
  wrap.innerHTML = svg;
  const svgEl = wrap.firstChild;

  if (xs.length) {
    const tooltip = document.createElement('div');
    tooltip.style.cssText =
      'position:absolute;display:none;pointer-events:none;z-index:10;'
      + 'background:rgba(15,15,35,0.96);border:1px solid #444;border-radius:4px;'
      + 'padding:6px 8px;font-size:11px;font-family:Menlo,monospace;color:#e0e0e0;'
      + 'white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.5)';
    wrap.appendChild(tooltip);

    const hoverGroup = svgEl.querySelector('.chart-hover');
    const hoverLine = svgEl.querySelector('.chart-hover-line');
    const hoverDots = Array.from(svgEl.querySelectorAll('.chart-hover-dot'));

    const fmtVal = (v) => {
      if (v === null || v === undefined) return '—';
      if (!isFinite(v)) return String(v);
      if (Number.isInteger(v)) return v.toLocaleString();
      return Number(v.toFixed(2)).toLocaleString();
    };

    function updateHover(ev) {
      const rect = svgEl.getBoundingClientRect();
      if (!rect.width) return;
      const mxPx = ev.clientX - rect.left;
      // Map client-pixel x into viewBox coordinates so xScale comparisons match.
      const svgX = (mxPx / rect.width) * W;
      let bestI = 0, bestDist = Infinity;
      for (let i = 0; i < xs.length; i++) {
        const d = Math.abs(xScale(xs[i]) - svgX);
        if (d < bestDist) { bestDist = d; bestI = i; }
      }
      const cycleX = xScale(xs[bestI]);
      hoverLine.setAttribute('x1', cycleX.toFixed(1));
      hoverLine.setAttribute('x2', cycleX.toFixed(1));
      hoverGroup.style.display = '';

      let html = `<div style="color:#bd93f9;margin-bottom:3px">cycle ${xs[bestI]}</div>`;
      for (let j = 0; j < drawnSeriesKeys.length; j++) {
        const k = drawnSeriesKeys[j];
        const v = series[k].values[bestI];
        const meta = PROGRESS_SERIES[k];
        const dot = hoverDots[j];
        if (v === null || v === undefined) {
          if (dot) dot.setAttribute('opacity', '0');
          html += `<div style="color:${meta.color};opacity:0.6">${escHtml(meta.label)}: —</div>`;
        } else if (series[k].valuesUpper) {
          // Band: lower = confirmed-Pass-or-waived; upper = total − definitive-Fail.
          // definitive-Fail = (verifier-Fail in current form) ∪ (SKETCH-marked).
          // Both signals are stable across reviewer task↔reset relabeling.
          // Tooltip also surfaces the noisier kernel-Fail / Unknown split for
          // diagnostic visibility — those oscillate cycle-to-cycle as the
          // reviewer relabels via task/reset blockers without verifier evidence.
          const upper = series[k].valuesUpper[bestI];
          const bucket = checkpoints[bestI] ? valueAt(checkpoints[bestI]) : null;
          const unk = bucket ? (bucket.sound_unknown || 0) : null;
          const total = bucket ? (bucket.total || 0) : null;
          const verifierFail = (bucket && bucket.sound_verifier_fail !== undefined && bucket.sound_verifier_fail !== null)
            ? bucket.sound_verifier_fail : null;
          const definitiveFail = (bucket && bucket.sound_definitive_fail !== undefined && bucket.sound_definitive_fail !== null)
            ? bucket.sound_definitive_fail : null;
          const reviewerFail = (total !== null && v !== null && v !== undefined && unk !== null)
            ? Math.max(0, total - v - unk) : null;
          if (dot) {
            dot.setAttribute('opacity', '1');
            dot.setAttribute('cx', cycleX.toFixed(1));
            dot.setAttribute('cy', yScaleFor(k)(v).toFixed(1));
          }
          const dfStr = definitiveFail !== null ? fmtVal(definitiveFail) : '—';
          const vfStr = verifierFail !== null ? fmtVal(verifierFail) : '—';
          html += `<div style="color:${meta.color}">sound/waived: ${fmtVal(v)} · definitive-fail: ${dfStr} (verifier: ${vfStr}, SKETCH: ${definitiveFail !== null && verifierFail !== null ? fmtVal(definitiveFail - verifierFail) : '—'}) · kernel-fail: ${fmtVal(reviewerFail)} · unknown: ${fmtVal(unk)} · total: ${fmtVal(upper)}</div>`;
        } else {
          if (dot) {
            dot.setAttribute('opacity', '1');
            dot.setAttribute('cx', cycleX.toFixed(1));
            dot.setAttribute('cy', yScaleFor(k)(v).toFixed(1));
          }
          html += `<div style="color:${meta.color}">${escHtml(meta.label)}: ${fmtVal(v)}</div>`;
        }
      }
      tooltip.innerHTML = html;
      tooltip.style.display = 'block';

      // Position tooltip in client-pixel space relative to the wrapper.
      // Default to right-of-cursor; flip to the left if it would overflow.
      const tipW = tooltip.offsetWidth;
      const tipH = tooltip.offsetHeight;
      const wrapRect = wrap.getBoundingClientRect();
      let tx = mxPx + 12;
      if (tx + tipW > wrapRect.width - 4) tx = mxPx - tipW - 12;
      if (tx < 4) tx = 4;
      let ty = (ev.clientY - rect.top) + 12;
      if (ty + tipH > rect.height - 4) ty = (ev.clientY - rect.top) - tipH - 12;
      if (ty < 4) ty = 4;
      tooltip.style.left = `${tx.toFixed(0)}px`;
      tooltip.style.top = `${ty.toFixed(0)}px`;
    }

    function clearHover() {
      hoverGroup.style.display = 'none';
      tooltip.style.display = 'none';
    }

    svgEl.addEventListener('mousemove', updateHover);
    svgEl.addEventListener('mouseleave', clearHover);
  }

  return wrap;
}

    const out = document.getElementById('usage-content');
    out.innerHTML = '';
    // Build a quick lookup: provider → llm_seconds (from on-demand
    // codex_timing aggregate). For non-codex providers this stays absent
    // and the column renders '—'. cache_w is dropped (all-zero for codex —
    // OpenAI doesn't surface a cache-creation token count).
    const llmByProvider = {};
    for (const r of (d.codex_timing_by_provider || [])) {
      llmByProvider[r.key] = r.llm_seconds;
    }
    out.appendChild(usageTable(
      'Per provider',
      ['provider', 'msgs', 'hours', 'in thought', 'burn %', 'USD'],
      d.by_provider.map((r) => [
        r.provider,
        r.bursts_with_msgs ? r.messages : '—',
        fmtSecondsToHm(r.duration_s),
        llmByProvider[r.provider] != null ? fmtSecondsToHm(llmByProvider[r.provider]) : '—',
        r.monthly_burn_pct == null ? '—' : `${r.monthly_burn_pct}%`,
        r.monthly_burn_usd == null ? '—' : `$${r.monthly_burn_usd.toFixed(2)}`,
      ])));
    out.appendChild(usageTable(
      'Per (provider, category)',
      ['provider', 'category', 'msgs', 'hours', 'burn %', 'USD'],
      (d.by_provider_category || []).map((r) => [
        r.provider, r.category,
        r.bursts_with_msgs ? r.messages : '—',
        fmtSecondsToHm(r.duration_s),
        r.monthly_burn_pct == null ? '—' : `${r.monthly_burn_pct}%`,
        r.monthly_burn_usd == null ? '—' : `$${r.monthly_burn_usd.toFixed(2)}`,
      ])));
    if ((d.wall_clock || []).length) {
      // Merged wall-clock breakdown: protocol stages from event_log
      // (kind=stage) + deterministic check.py subcommands (kind=check)
      // + raw git subprocesses from the kernel (kind=git). All in one
      // table sorted by total time, totals only — per-call averages
      // were dropped per design discussion.
      out.appendChild(usageTable(
        'Wall-clock (totals)',
        ['kind', 'name', 'count', 'total'],
        d.wall_clock.map((r) => [
          r.kind, r.name,
          (r.intervals != null ? r.intervals : (r.count != null ? r.count : '—')),
          fmtSecondsToHm(r.duration_s),

    // section are intentionally hidden from the rendered Usage page;
    // the data is still in /api/usage.json for any downstream
    // consumer that wants it.
  } catch (e) {
    document.getElementById('usage-status').textContent = `Load failed: ${e.message}`;
  }
}

function usageTable(title, cols, rows) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'background:#0b0b1e;border:1px solid #333;border-radius:6px;padding:10px';
  let html = `<div style="color:#8be9fd;font-weight:bold;margin-bottom:6px">${escHtml(title)}</div>`;
  html += `<table style="width:100%;border-collapse:collapse;font-size:11px;font-family:Menlo,monospace">`;
  html += `<thead><tr>${cols.map((c) => `<th style="text-align:right;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">${escHtml(String(c))}</th>`).join('')}</tr></thead>`;
  html += `<tbody>`;
  for (const r of rows) {
    html += `<tr>${r.map((cell) => `<td style="text-align:right;padding:3px 6px;border-bottom:1px solid #1a1a2e">${escHtml(String(cell))}</td>`).join('')}</tr>`;
  }

  return wrap;
}

function usageQuotaSection(quota) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'background:#0b0b1e;border:1px solid #333;border-radius:6px;padding:10px';
  let html = `<div style="color:#8be9fd;font-weight:bold;margin-bottom:6px">Current quota windows
    <span style="color:#6272a4;font-size:11px;font-weight:normal">(monthly_burn = pct_used × window_fraction_of_30-day_month)</span>
  </div>`;
  // Per-provider headline: longest-cadence window's pct-used translated
  // to a dollar value against the configured monthly subscription price.
  // (Not a rate — the actual subscription value consumed so far this
  // window.) Cross-provider "what has this run actually consumed?"
  const priceRows = [];
  for (const prov of Object.keys(quota).sort()) {
    const snap = quota[prov] || {};
    if (snap.effective_monthly_usd == null) continue;
    priceRows.push(`<tr>
      <td style="padding:3px 6px">${escHtml(prov)}</td>
      <td style="text-align:right;padding:3px 6px">$${snap.effective_monthly_usd.toFixed(2)}</td>
      <td style="text-align:right;padding:3px 6px;color:#6272a4">/ $${snap.subscription_usd}/mo</td>
      <td style="padding:3px 6px;color:#6272a4">${escHtml(snap.effective_monthly_usd_basis || '')}</td>
    </tr>`);
  }
  if (priceRows.length) {
    html += `<table style="width:100%;border-collapse:collapse;font-size:11px;font-family:Menlo,monospace;margin-bottom:8px">
      <thead><tr>
        <th style="text-align:left;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">provider</th>
        <th style="text-align:right;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">consumed (USD)</th>
        <th style="text-align:right;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">/ subscription</th>
        <th style="text-align:left;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">basis</th>
      </tr></thead><tbody>${priceRows.join('')}</tbody></table>`;
  }
  const providers = Object.keys(quota).sort();
  if (!providers.length) {
    html += `<div style="color:#6272a4;font-size:11px">no probes yet</div>`;
    wrap.innerHTML = html;
    return wrap;
  }
  html += `<table style="width:100%;border-collapse:collapse;font-size:11px;font-family:Menlo,monospace">
    <thead><tr>
      <th style="text-align:left;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">provider</th>
      <th style="text-align:left;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">scope</th>
      <th style="text-align:right;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">pct_used</th>
      <th style="text-align:right;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">resets_in</th>
      <th style="text-align:right;padding:3px 6px;border-bottom:1px solid #333;color:#6272a4">monthly_burn</th>
    </tr></thead><tbody>`;
  const now = Math.floor(Date.now() / 1000);
  function fmtPct(p) { if (p == null) return '—'; if (p === 0) return '0%'; if (p < 0.1) return p.toFixed(2) + '%'; if (p < 1) return p.toFixed(1) + '%'; return p.toFixed(0) + '%'; }
  function fmtResets(s) {
    if (s == null) return '—';
    s = Math.max(0, s | 0);
    if (s >= 86400) return `${Math.floor(s / 86400)}d ${Math.floor((s % 86400) / 3600)}h`;
    if (s >= 3600) return `${Math.floor(s / 3600)}h ${Math.floor((s % 3600) / 60)}m`;
    if (s >= 60) return `${Math.floor(s / 60)}m`;
    return `${s}s`;
  }
  for (const prov of providers) {
    const snap = quota[prov] || {};
    if (!snap.ok) {
      html += `<tr><td style="padding:3px 6px;color:#ff5555">${escHtml(prov)}</td><td colspan="4" style="padding:3px 6px;color:#ff5555">probe failed: ${escHtml((snap.error || '').slice(0, 80))}</td></tr>`;
      continue;
    }
    const wins = snap.windows || [];
    const models = snap.models || [];
    for (const w of wins) {
      const ri = (w.resets_in_seconds != null) ? w.resets_in_seconds :
        (w.resets_at != null ? Math.max(0, Number(w.resets_at) - now) : null);
      html += `<tr>
        <td style="padding:3px 6px">${escHtml(prov)}</td>
        <td style="padding:3px 6px">${escHtml((w.name || '?') + (w.pct_used_kind === 'band' ? ' (band)' : ''))}</td>
        <td style="text-align:right;padding:3px 6px">${fmtPct(w.pct_used)}</td>
        <td style="text-align:right;padding:3px 6px">${fmtResets(ri)}</td>
        <td style="text-align:right;padding:3px 6px">${fmtPct(w.monthly_burn_pct)}</td>
      </tr>`;
    }
    for (const m of models) {
      html += `<tr>
        <td style="padding:3px 6px">${escHtml(prov)}</td>
        <td style="padding:3px 6px">model:${escHtml(m.category || m.model || '?')}</td>
        <td style="text-align:right;padding:3px 6px">${fmtPct(m.pct_used)}</td>
        <td style="text-align:right;padding:3px 6px">${fmtResets(m.resets_in_seconds)}</td>
        <td style="text-align:right;padding:3px 6px">${fmtPct(m.monthly_burn_pct)}</td>
      </tr>`;
    }
  }
  html += `</tbody></table>`;
  wrap.innerHTML = html;
  return wrap;
}

async function refreshKernelPane() {
  const status = document.getElementById('kernel-status');
  const eventsPre = document.getElementById('kernel-events-text');
  const pane = document.getElementById('kernel-pane-text');
  if (!eventsPre || !pane) return;
  // Preserve scroll-pinned-to-bottom across refreshes per pre.
  function wasPinned(el) { return (el.scrollTop + el.clientHeight) >= (el.scrollHeight - 8); }
  function maybePin(el, was) { if (was) el.scrollTop = el.scrollHeight; }
  const wasEvPinned = wasPinned(eventsPre);
  const wasPanePinned = wasPinned(pane);
  try {
    const r = await fetch(apiPath('kernel-pane.json?tail=80'));
    if (!r.ok) throw new Error(`kernel-pane.json -> ${r.status}`);
    const d = await r.json();
    // Status line: pane source + event count.
    const p = d.pane || {};
    const evCount = (d.events || []).length;
    let statusBits = [];
    if (p.source === 'tmux') statusBits.push(`pane: tmux ${p.session}`);
    else if (p.source === 'logfile') statusBits.push(`pane: tail of ${p.logfile}`);
    else statusBits.push(`pane: ${p.note || 'unavailable'}`);
    statusBits.push(`events: ${evCount}`);
    status.textContent = statusBits.join(' · ');
    // Format events: idx | kind | summary | cmds
    const evLines = (d.events || []).map((e) => {
      const cmds = e.commands && e.commands.length ? `[${e.commands.join(',')}]` : '';
      const sum = e.summary || '';
      return `${String(e.index).padStart(4)} ${e.kind.padEnd(18)} ${sum} ${cmds}`.trimEnd();
    }).join('\n');
    if (eventsPre.textContent !== evLines) {
      eventsPre.textContent = evLines;
      maybePin(eventsPre, wasEvPinned);
    }
    const paneText = (p.text || '');
    if (pane.textContent !== paneText) {
      pane.textContent = paneText || '(pane empty — kernel writes stdout only on errors)';
      maybePin(pane, wasPanePinned);
    }
  } catch (e) {
    status.textContent = `Load failed: ${e.message}`;
  }
}
