<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proof Tablet Viewer</title>
<!-- KaTeX (math rendering for the optional Rendered TeX toggle in the
     Node detail pane). Loaded async-defer; toggle defaults OFF, so the
     viewer still works if the CDN is unreachable. -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 13px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }

header { background: #16213e; padding: 8px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #333; }
header h1 { font-size: 14px; color: #8be9fd; }
header .header-meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
header .status { color: #6272a4; font-size: 12px; }
header .activity { color: #f1fa8c; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.toggle-label-short { display: none; }

.main { display: flex; flex: 1; overflow: hidden; }

.mobile-pane-switcher { display: none; }

.dag-pane { flex: 1; overflow: auto; padding: 16px; position: relative; min-width: 0; }
.detail-resizer { width: 6px; cursor: col-resize; background: #1a1a2e; border-left: 1px solid #333; border-right: 1px solid #333; flex-shrink: 0; transition: background 0.1s; user-select: none; }
.detail-resizer:hover, .detail-resizer.dragging { background: #44475a; }
.detail-pane { width: var(--detail-pane-width, 420px); flex-shrink: 0; overflow-y: auto; padding: 16px; background: #0f0f23; }
.detail-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
.detail-toggle { padding: 6px 10px; border: 1px solid #334; background: #161b33; color: #8be9fd; border-radius: 6px; cursor: pointer; font-size: 11px; text-transform: uppercase; }
.detail-toggle.active { background: #24345f; border-color: #8be9fd; color: #ffffff; }
.detail-pane h2 { font-size: 14px; color: #8be9fd; margin-bottom: 8px; }
.detail-pane .field { margin-bottom: 12px; }
.detail-pane .field-label { color: #6272a4; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
.detail-pane .field-value { white-space: pre-wrap; word-wrap: break-word; font-size: 12px; line-height: 1.5; }
.detail-pane .collapsible { max-height: 120px; overflow: hidden; position: relative; cursor: pointer; }
.detail-pane .collapsible.expanded { max-height: none; }
.detail-pane .collapsible::after { content: '▼ click to expand'; display: block; text-align: center; color: #6272a4; font-size: 10px; padding: 4px; background: linear-gradient(transparent, #0f0f23); position: absolute; bottom: 0; left: 0; right: 0; }
.detail-pane .collapsible.expanded::after { content: '▲ click to collapse'; position: static; background: none; }

.feedback-panel { background: #1e1e3a; border: 1px solid #f1fa8c; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.feedback-panel h3 { color: #f1fa8c; font-size: 13px; margin-bottom: 8px; }
.feedback-panel textarea { width: 100%; height: 80px; background: #0f0f23; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 8px; font-family: inherit; font-size: 12px; resize: vertical; }
.feedback-panel .btn { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 8px; margin-top: 8px; }
.feedback-panel .btn-approve { background: #50fa7b; color: #1a1a2e; }
.feedback-panel .btn-feedback { background: #f1fa8c; color: #1a1a2e; }
.feedback-panel .btn:hover { opacity: 0.8; }
.feedback-panel .msg { color: #8be9fd; font-size: 11px; margin-top: 6px; }
.chat-artifact { border: 1px solid #28314d; border-radius: 8px; margin-bottom: 12px; background: #14182d; overflow: hidden; }
.chat-artifact summary { list-style: none; cursor: pointer; padding: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.chat-artifact summary::-webkit-details-marker { display: none; }
.chat-artifact summary::after { content: '▼'; color: #6272a4; font-size: 10px; flex-shrink: 0; }
.chat-artifact[open] summary::after { content: '▲'; }
.chat-artifact h3 { font-size: 12px; color: #f1fa8c; margin: 0; }
.chat-artifact-meta { color: #6272a4; font-size: 11px; }
.chat-artifact-body { padding: 0 10px 10px; }
.chat-entry { margin-bottom: 10px; }
.chat-entry-label { color: #6272a4; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }

.timeline { background: #16213e; padding: 8px 16px; border-top: 1px solid #333; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.timeline label { color: #6272a4; font-size: 12px; white-space: nowrap; }
.timeline input[type=range] { flex: 1; }
.timeline .cycle-info { color: #f1fa8c; font-size: 12px; flex: 0 0 280px; width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.timeline .cycle-step { background: #1a1f3a; color: #8be9fd; border: 1px solid #334; border-radius: 4px; cursor: pointer; font: inherit; font-size: 14px; line-height: 1; padding: 2px 8px; flex-shrink: 0; }
.timeline .cycle-step:hover:not(:disabled) { background: #24345f; border-color: #8be9fd; }
.timeline .cycle-step:disabled { opacity: 0.35; cursor: default; }
.timeline .slot-labels { width: 100%; display: flex; justify-content: space-between; gap: 8px; color: #6272a4; font-size: 10px; line-height: 1.2; }
.timeline .slot-labels button { flex: 1; min-width: 0; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: transparent; border: none; color: inherit; font: inherit; cursor: pointer; padding: 2px 0; }
.timeline .slot-labels button.selected { color: #f1fa8c; }

/* Patch C local-closure summary banner: shown above the DAG SVG when one or
   more nodes are local-closure-unverified. Amber border to match the node
   stroke color so the operator can see at a glance which color in the DAG
   corresponds to which summary. Hidden when unverified_count == 0. */
#closure-summary-banner {
  background: #2a230a; border: 1px solid #ffb86c; border-radius: 6px;
  padding: 8px 12px; margin-bottom: 12px; color: #f8f8f2; font-size: 12px;
  line-height: 1.5;
}
#closure-summary-banner h3 { font-size: 12px; color: #ffb86c; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
#closure-summary-banner .closure-counts { color: #d8d8d8; font-size: 11px; margin-bottom: 6px; }
#closure-summary-banner .closure-counts span { margin-right: 12px; }
#closure-summary-banner ul { margin: 4px 0 0 16px; padding: 0; }
#closure-summary-banner li { color: #f8f8f2; font-size: 11px; word-break: break-word; }
#closure-summary-banner li code { color: #ffb86c; background: transparent; }

/* DAG nodes */
svg { width: 100%; height: 100%; }
.node rect, .node polygon, .node circle { stroke-width: 2; cursor: pointer; }
.node text { font-size: 11px; fill: #e0e0e0; pointer-events: none; }
.node .diff-easy { font-size: 9px; fill: #50fa7b !important; }
.node .diff-hard { font-size: 9px; fill: #ffb86c !important; }
.node.closed rect, .node.closed polygon, .node.closed circle { fill: #1e3a5f; stroke: #4a9eff; }
.node.recursive-closed rect, .node.recursive-closed polygon, .node.recursive-closed circle { fill: #1a3d2e; stroke: #50fa7b; }
/* Patch C local-closure-unverified node: kernel-closed (not in open_nodes)
   but local-closure probe has not blessed it. Distinct amber so it reads
   apart from green (verified-closed) and red/grey (open). The base color
   stays for both shallow- and recursively-closed cases; we override the
   stroke + fill via .unverified, applied in addition to .closed/.recursive-closed. */
.node.unverified rect, .node.unverified polygon, .node.unverified circle { fill: #3d3000; stroke: #ffb86c; }
.node.active rect, .node.active polygon, .node.active circle { fill: #3d3500; stroke: #f1fa8c; }
.node.open rect, .node.open polygon, .node.open circle { fill: #2a2a3d; stroke: #6272a4; }
.node.error rect, .node.error polygon, .node.error circle { fill: #3d1a1a; stroke: #ff5555; }
.node.selected rect, .node.selected polygon, .node.selected circle { stroke-width: 3; }
.node.correspondence-working rect, .node.correspondence-working polygon, .node.correspondence-working circle { stroke: #f1fa8c !important; stroke-width: 3; }
.node.reviewer-working rect, .node.reviewer-working polygon, .node.reviewer-working circle { stroke: #8be9fd !important; stroke-width: 3; }
.node.worker-working rect, .node.worker-working polygon, .node.worker-working circle { stroke: #f1fa8c !important; stroke-width: 3; }
.edge { fill: none; stroke-width: 1.5; pointer-events: none; }
.edge.edge-failed { stroke: #444; }
.edge.edge-unknown { stroke: #a2a2a2; }
.edge.edge-nl-pass { stroke: #bd93f9; }
.edge.to-closed { stroke: #4a9eff; }
.edge.active { stroke-width: 3.5; }
.edge.soundness-working { stroke: #f1fa8c !important; stroke-width: 2.5; }
.edge.soundness-working.active { stroke-width: 3.5; }

/* Chat-tab TUI state: visually differentiate a live capture from a
   frozen pane.txt snapshot so the user can tell at a glance when the
   pane is still moving. */
#chat-view-container.tui-live {
  border: 2px solid #50fa7b;
  box-shadow: 0 0 0 1px #50fa7b40 inset;
  background: #0b140e;
}
#chat-view-container.tui-snapshot {
  border: 2px dashed #ffb86c;
  background: #1a150b;
  position: relative;
}
#chat-view-container.tui-snapshot::after {
  content: 'FROZEN';
  position: sticky;
  bottom: 8px;
  left: 100%;
  margin-left: -72px;
  margin-right: 8px;
  background: #ffb86c;
  color: #1a1a2e;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 1px;
  display: block;
  float: right;
  pointer-events: none;
}
#chat-view-container.tui-snapshot pre {
  opacity: 0.82;
}
/* "Thoughts only" filter: hides tool-event cards (tool_call, tool_result,
   command_execution, file_change, etc.) via a class on the container so
   toggling is a pure DOM-class flip — no re-fetch, no re-render. */
#chat-view-container.thoughts-only .chat-card-tool { display: none; }
#chat-view-container .chat-thoughts-empty-state { display: none; }
#chat-view-container.thoughts-only .chat-thoughts-empty-state.show { display: block; }
.live-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: #50fa7b;
  box-shadow: 0 0 4px #50fa7b;
  vertical-align: middle;
  margin-right: 4px;
  animation: live-pulse 1.4s ease-in-out infinite;
}

/* Collapsible content sections in the node detail pane (Lean Imports /
   NL statement / Lean statement / NL proof / Lean proof). Uses the
   native <details> element so keyboard + a11y work for free; styled to
   match the existing field-label aesthetic with an arrow on the same
   line. The arrow flips between ▶ (closed) and ▼ (open) via CSS. */
.detail-pane details.node-section { margin-bottom: 12px; }
.detail-pane details.node-section > summary {
  list-style: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  color: #6272a4;
  font-size: 11px;
  text-transform: uppercase;
  margin-bottom: 4px;
  user-select: none;
}
.detail-pane details.node-section > summary::-webkit-details-marker { display: none; }
.detail-pane details.node-section > summary::before {
  content: '▶';
  font-size: 9px;
  color: #6272a4;
  transition: transform 0.1s;
  display: inline-block;
  width: 10px;
  text-align: center;
}
.detail-pane details.node-section[open] > summary::before { content: '▼'; }
.detail-pane details.node-section > .field-value {
  margin-top: 2px;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 12px;
  line-height: 1.5;
}

/* Rendered TeX (optional toggle inside Node detail pane). Restyled to
   read more like a paper while staying inside the viewer's dark
   palette — KaTeX defaults assume a light background. */
.rendered-tex {
  font-family: 'Latin Modern Roman', 'STIX Two Text', 'Cambria', Georgia, serif;
  font-size: 13px; line-height: 1.55; color: #e0e0e0;
  white-space: normal;
}
.rendered-tex p { margin: 0 0 0.6em 0; }
.rendered-tex .katex { font-size: 1.02em; color: #f8f8f2; }
.rendered-tex .katex-display { margin: 0.6em 0; overflow-x: auto; overflow-y: hidden; }
.rendered-tex .tex-env { margin: 0.6em 0; padding: 6px 10px; border-left: 3px solid #44475a; background: #11142a; border-radius: 3px; }
.rendered-tex .tex-env.tex-lemma,
.rendered-tex .tex-env.tex-theorem,
.rendered-tex .tex-env.tex-corollary,
.rendered-tex .tex-env.tex-proposition,
.rendered-tex .tex-env.tex-helper { border-left-color: #8be9fd; font-style: italic; }
.rendered-tex .tex-env.tex-proof { border-left-color: #6272a4; font-style: normal; color: #d8d8d8; }
.rendered-tex .tex-env-label { font-style: normal; font-weight: bold; color: #f1fa8c; margin-right: 0.4em; }
.rendered-tex .tex-env.tex-proof .tex-env-label { color: #8be9fd; }
.rendered-tex .tex-env.tex-proof .tex-proof-end { float: right; color: #8be9fd; font-style: normal; }
.rendered-tex a.noderef,
.rendered-tex a[href^="noderef:"] {
  color: #bd93f9; text-decoration: none; cursor: pointer;
  font-variant: small-caps; font-style: normal;
  border-bottom: 1px dotted #6272a4;
}
.rendered-tex a.noderef:hover,
.rendered-tex a[href^="noderef:"]:hover { color: #ff79c6; border-bottom-color: #ff79c6; }
/* KaTeX wraps the macro-generated \href body in nested spans; ensure
   the small-caps + color styling reaches the inner text too. */
.rendered-tex a[href^="noderef:"] .mord { color: inherit; }
.rendered-tex .tex-error { color: #ff5555; font-family: 'Menlo', monospace; font-size: 11px; }
@keyframes live-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px #50fa7b; }
  50%      { opacity: 0.4; box-shadow: 0 0 10px #50fa7b; }
}

/* Mobile: top-of-page tab switcher flips between DAG and Details full-screen */
@media (max-width: 768px) {
  body { font-size: 12px; }
  header { padding: 6px 10px; gap: 8px; flex-wrap: wrap; }
  header h1 { font-size: 13px; }
  header .status { font-size: 11px; }
  header .activity { font-size: 11px; white-space: normal; }
  .toggle-label-full { display: none; }
  .toggle-label-short { display: inline; }

  .main { flex-direction: column; min-height: 0; }
  .mobile-pane-switcher {
    display: flex; gap: 6px; padding: 6px 10px; background: #0f0f23;
    border-bottom: 1px solid #333; flex-shrink: 0;
    /* Below header (no order) but above timeline (order -1). */
    order: -2;
  }
  .mobile-pane-switcher button {
    flex: 1; padding: 8px 12px; border: 1px solid #334; background: #161b33;
    color: #8be9fd; border-radius: 6px; cursor: pointer; font-size: 12px;
    text-transform: uppercase; font-family: inherit;
  }
  .mobile-pane-switcher button.active {
    background: #24345f; border-color: #8be9fd; color: #ffffff;
  }
  .dag-pane { flex: 1; padding: 8px; overflow: hidden; touch-action: none; min-height: 0; }
  .detail-resizer { display: none; }
  .detail-pane {
    width: 100% !important; border-left: none; border-top: none;
    padding: 12px;
    display: none; flex: 1; min-height: 0;
  }
  /* Default mobile state: show DAG. When body has .mobile-view-detail,
     swap: hide DAG, show Details. */
  body.mobile-view-detail .dag-pane { display: none; }
  body.mobile-view-detail .detail-pane { display: block; overflow-y: auto; }
  .detail-pane .collapsible { max-height: 80px; }

  .timeline { padding: 6px 10px; gap: 8px; flex-wrap: wrap; order: -1; border-top: none; border-bottom: 1px solid #333; flex-shrink: 0; }
  .timeline .cycle-info { flex: 0 1 auto; width: auto; min-width: 0; font-size: 11px; }
  .timeline .cycle-step { padding: 4px 10px; }

  .feedback-panel textarea { height: 60px; font-size: 11px; }
  .feedback-panel .btn { padding: 8px 16px; font-size: 13px; }

  /* Larger tap targets for nodes */
  .node rect, .node polygon { stroke-width: 2.5; }

  /* Close button hidden on mobile — pane switcher handles swap */
  .detail-close { display: none; }
}
@media (min-width: 769px) {
  .detail-close { display: none; }
  .mobile-pane-switcher { display: none; }
}
</style>
</head>
<body>

<!-- Fail-loudly halt banner. Visible only when the kernel persisted
     `<runtime>/checker_disagreement_halt.json`. The banner pins to
     viewport top, sits above all other UI, and stays visible until the
     operator deletes the marker. Polled every 30s alongside other
     viewer state. -->
<div id="halt-banner" style="display:none;position:sticky;top:0;z-index:9999;background:#ff5555;color:#1a1a2e;padding:10px 16px;font-weight:bold;border-bottom:3px solid #ff0000;font-size:13px;line-height:1.5">
</div>

<header>
  <h1>Proof Tablet Viewer</h1>
  <div class="header-meta">
    <div class="status" id="header-status">Loading...</div>
    <div class="activity" id="header-activity">Current activity: loading...</div>
  </div>
  <label id="auto-refresh-toggle"
         style="margin-left:auto;display:flex;align-items:center;gap:6px;cursor:pointer;color:#e0e0e0;font-size:12px;white-space:nowrap"
         title="When off, the viewer stops polling for new run state every 30s. Click anywhere on the page to manually re-fetch via the Refresh button next to the toggle.">
    <input type="checkbox" id="auto-refresh-checkbox" checked
           onchange="setAutoRefresh(this.checked)" style="cursor:pointer">
    <span>Auto-refresh</span>
    <button type="button" id="manual-refresh-btn" onclick="fetchData()"
            style="margin-left:4px;background:#1a1a2e;color:#8be9fd;border:1px solid #444;border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer"
            title="Manually fetch the latest state once">Refresh</button>
  </label>
  <label id="include-defs-toggle"
         style="display:flex;align-items:center;gap:6px;cursor:pointer;color:#e0e0e0;font-size:12px;white-space:nowrap"
         title="When off, definition nodes are hidden from every DAG view; import edges are rewired through the closure of definition→definition chains, falling back to the Preamble when the closure is empty.">
    <input type="checkbox" id="include-defs-checkbox" checked
           onchange="setIncludeDefs(this.checked)" style="cursor:pointer">
    <span class="toggle-label-full">Include definitions</span>
    <span class="toggle-label-short">Defs</span>
  </label>
  <label id="coarse-open-toggle"
         style="display:flex;align-items:center;gap:6px;cursor:pointer;color:#e0e0e0;font-size:12px;white-space:nowrap"
         title="When on, the DAG shows only coarse-DAG nodes plus non-coarse helpers that are not yet shallowly Lean-closed. Hidden helpers are shallowly closed (themselves closed and all non-coarse descendants closed); imports through them are rewired to surface the underlying coarse dependencies.">
    <input type="checkbox" id="coarse-open-checkbox"
           onchange="setCoarseOpenOnly(this.checked)" style="cursor:pointer">
    <span class="toggle-label-full">Coarse + open only</span>
    <span class="toggle-label-short">Coarse only</span>
  </label>
</header>

<div class="mobile-pane-switcher" id="mobile-pane-switcher">
  <button type="button" id="mobile-tab-dag" class="active" onclick="setMobilePane('dag')">DAG</button>
  <button type="button" id="mobile-tab-detail" onclick="setMobilePane('detail')">Details</button>
</div>

<div class="main">
  <div class="dag-pane" id="dag-pane">
    <div id="closure-summary-banner" style="display:none"></div>
    <svg id="dag-svg"></svg>
  </div>
  <div class="detail-resizer" id="detail-resizer" title="Drag to resize; double-click to reset"></div>
  <div class="detail-pane" id="detail-pane">
    <div class="detail-close" onclick="setMobilePane('dag')">✕</div>
    <div class="detail-toolbar">
      <button class="detail-toggle active" id="mode-node" onclick="setDetailMode('node')">Node</button>
      <button class="detail-toggle" id="mode-chat" onclick="setDetailMode('chat')">Chats</button>
      <button class="detail-toggle" id="mode-progress" onclick="setDetailMode('progress')">Progress</button>
      <button class="detail-toggle" id="mode-usage" onclick="setDetailMode('usage')">Usage</button>
      <button class="detail-toggle" id="mode-kernel" onclick="setDetailMode('kernel')">Kernel</button>
    </div>
    <div id="feedback-container"></div>
    <div id="detail-content">
      <h2>Select a node</h2>
      <p style="color:#6272a4">Tap a node in the DAG to see details.</p>
    </div>
  </div>
</div>

<div class="timeline">
  <label>Cycle:</label>
  <button type="button" id="cycle-prev" class="cycle-step" title="Previous cycle" aria-label="Previous cycle">&#8249;</button>
  <input type="range" id="cycle-slider" min="0" max="0" value="0">
  <button type="button" id="cycle-next" class="cycle-step" title="Next cycle" aria-label="Next cycle">&#8250;</button>
  <div class="cycle-info" id="cycle-info">Current</div>
  <div class="slot-labels" id="timeline-slot-labels"></div>
</div>

<script>
// Dagre-lite: simple topological layered layout
function layoutDAG(nodes, edges) {
  // Topological sort (Kahn's)
  const inDeg = {};
  const adj = {};
  for (const n of Object.keys(nodes)) { inDeg[n] = 0; adj[n] = []; }
  for (const [from, to] of edges) {
    if (adj[to]) adj[to].push(from);
    if (inDeg[from] !== undefined) inDeg[from]++;
  }

  // Assign layers (longest path from leaves)
  const layer = {};
  const queue = Object.keys(nodes).filter(n => inDeg[n] === 0);
  for (const n of queue) layer[n] = 0;

  const visited = new Set();
  const order = [];
  const q = [...queue];
  while (q.length) {
    const n = q.shift();
    if (visited.has(n)) continue;
    visited.add(n);
    order.push(n);
    for (const child of (adj[n] || [])) {
      layer[child] = Math.max(layer[child] || 0, (layer[n] || 0) + 1);
      inDeg[child]--;
      if (inDeg[child] <= 0) q.push(child);
    }
  }

  // Handle unvisited nodes
  for (const n of Object.keys(nodes)) {
    if (!visited.has(n)) { layer[n] = 0; order.push(n); }
  }

  // Group by layer
  const layers = {};
  for (const [n, l] of Object.entries(layer)) {
    if (!layers[l]) layers[l] = [];
    layers[l].push(n);
  }

  // Position. Helper nodes are rendered as compact circles, so they also use
  // a compact layout footprint instead of reserving a full theorem box slot.
  const nodeW = 180, helperW = 20, nodeH = 40, padX = 40, helperPadX = 18, padY = 60;
  const footprintW = (name) => isHelperNode(nodes[name]) ? helperW : nodeW;
  const gapAfter = (name) => isHelperNode(nodes[name]) ? helperPadX : padX;
  const positions = {};
  const maxLayer = Math.max(...Object.keys(layers).map(Number));

  for (let l = 0; l <= maxLayer; l++) {
    const nodesInLayer = layers[l] || [];
    const totalW = nodesInLayer.reduce((sum, n, i) =>
      sum + footprintW(n) + (i + 1 < nodesInLayer.length ? gapAfter(n) : 0), 0);
    let x = -totalW / 2;
    for (const n of nodesInLayer) {
      const w = footprintW(n);
      positions[n] = { x: x + w / 2, y: l * (nodeH + padY) };
      x += w + gapAfter(n);
    }
  }

  return positions;
}

let allNodes = {}, allCycles = [], timelineSlots = [], selectedNode = null, hoveredNode = null, currentState = {}, liveState = {}, detailMode = 'node', timelineUpdateSeq = 0;

// Heavy per-node content (leanContent / texContent / declaration) is no
// longer shipped inline in viewer-state.json / state-at — see
// thinViewerStatePayload in server.js. We lazy-fetch it for the one node
// the user is viewing. Cache key is `${cycle}::${name}`; hits populate
// `allNodes[name]` so existing render code reads it transparently.
const nodeContentCache = new Map();
const nodeContentInflight = new Map();
function currentCycleForContent() {
  const c = currentState && currentState.state && currentState.state.cycle;
  return (typeof c === 'number' && c > 0) ? c : 'live';
}
function applyNodeContent(name, content) {
  const node = allNodes[name];
  if (!node || !content) return;
  node.leanContent = content.leanContent || '';
  node.texContent = content.texContent || '';
  node.declaration = content.declaration || '';
}
function fetchNodeContent(name) {
  const cycle = currentCycleForContent();
  const key = `${cycle}::${name}`;
  if (nodeContentCache.has(key)) {
    applyNodeContent(name, nodeContentCache.get(key));
    return Promise.resolve(nodeContentCache.get(key));
  }
  if (nodeContentInflight.has(key)) return nodeContentInflight.get(key);
  const p = (async () => {
    const r = await fetch(apiPath(`node-content/${encodeURIComponent(String(cycle))}/${encodeURIComponent(name)}.json`));
    if (!r.ok) throw new Error(`node-content/${cycle}/${name} -> ${r.status}`);
    const data = await r.json();
    const content = {
      leanContent: data.leanContent || '',
      texContent: data.texContent || '',
      declaration: data.declaration || '',
    };
    nodeContentCache.set(key, content);
    applyNodeContent(name, content);
    return content;
  })().finally(() => nodeContentInflight.delete(key));
  nodeContentInflight.set(key, p);
  return p;
}

// ---------------------------------------------------------------------------
// DAG-filter toggles (persist in localStorage).
//
// "Include definitions" (default ON). When OFF: nodes whose kind=="definition"
// are hidden from every DAG view.
//
// "Coarse + open only" (default OFF). When ON: only coarse-DAG nodes plus
// non-coarse helpers that are not yet *shallowly* Lean-closed are shown. A
// non-coarse node x is shallowly closed iff x itself is committed-closed AND
// every non-coarse-DAG transitive dep of x (descending through `imports`,
// stopping AT coarse-DAG nodes) is committed-closed. Mirrors the predicate
// in viewer/server.js `isCoarseShallowlyClosed`.
//
// Both toggles compose: a node is hidden if either filter would hide it.
// Hidden imports are rewired through the closure of hidden→hidden chains so
// each visible node's import list bottoms out at visible nodes (definitions
// rewire to their first non-definition ancestors; closed helpers rewire to
// the coarse-DAG nodes that ultimately back them). If a visible node's
// closure is empty, it falls back to importing the Preamble so the rewired
// DAG stays connected and rooted.
// ---------------------------------------------------------------------------
const INCLUDE_DEFS_STORAGE_KEY = 'trellis.viewer.includeDefs';
const COARSE_OPEN_STORAGE_KEY = 'trellis.viewer.coarseOpenOnly';
const PREAMBLE_NAME = 'Preamble';

function readIncludeDefs() {
  try {
    const raw = localStorage.getItem(INCLUDE_DEFS_STORAGE_KEY);
    if (raw === '0' || raw === 'false') return false;
  } catch {}
  return true;  // default ON
}

function readCoarseOpenOnly() {
  try {
    const raw = localStorage.getItem(COARSE_OPEN_STORAGE_KEY);
    if (raw === '1' || raw === 'true') return true;
  } catch {}
  return false;  // default OFF
}

let includeDefs = readIncludeDefs();
let coarseOpenOnly = readCoarseOpenOnly();
// Memo for the "first visible ancestors" closure. Keyed by hidden-node name;
// value is a Set of visible-node names. Invalidated on every fresh allNodes
// assignment (and on toggle changes) via invalidateDefClosure().
let defClosureMemo = new Map();
// Memo for the per-node shallow-closure-from-coarse predicate. Keyed by node
// name; boolean value. Invalidated whenever `coarseOpenOnly` flips, allNodes
// is reassigned, or committed.{present,open}_nodes changes (i.e. a fresh
// currentState landing).
let shallowClosedMemo = new Map();

function invalidateDefClosure() {
  defClosureMemo = new Map();
  shallowClosedMemo = new Map();
}

function isDefinitionNode(node) {
  return !!node && String(node.kind || '').toLowerCase() === 'definition';
}

function isHelperNode(node) {
  return !!node && String(node.texEnv || '').toLowerCase() === 'helper';
}

function coarseDagSet() {
  const raw = currentState?.state?.coarse_dag_nodes;
  return new Set(Array.isArray(raw) ? raw : []);
}

// Shallow-closure-from-coarse predicate. Returns true iff `name` is committed-
// closed AND every non-coarse-DAG transitive dep (through `imports`, stopping
// AT coarse-DAG nodes) is committed-closed. Mirrors viewer/server.js
// `isCoarseShallowlyClosed`. Cycle-safe (a cycle in the deps would be a
// kernel bug, but the stack guard keeps us from looping).
function isShallowlyClosedFromCoarse(name, coarseSet, stack) {
  if (shallowClosedMemo.has(name)) return shallowClosedMemo.get(name);
  if (stack.has(name)) return true;  // cycle guard
  const node = allNodes[name];
  if (!node) { shallowClosedMemo.set(name, false); return false; }
  if (!isCommittedClosed(name, allNodes)) {
    shallowClosedMemo.set(name, false);
    return false;
  }
  stack.add(name);
  for (const imp of (node.imports || [])) {
    if (!allNodes[imp]) continue;
    if (coarseSet.has(imp)) continue;  // STOP at coarse-DAG boundary
    if (!isShallowlyClosedFromCoarse(imp, coarseSet, stack)) {
      stack.delete(name);
      shallowClosedMemo.set(name, false);
      return false;
    }
  }
  stack.delete(name);
  shallowClosedMemo.set(name, true);
  return true;
}

// Combined hidden-node predicate. A node is hidden iff:
//   - includeDefs is OFF and the node is a definition, OR
//   - coarseOpenOnly is ON and the node is non-coarse AND shallowly closed.
function isHiddenNode(name, node, coarseSet) {
  if (!node) return false;
  if (!includeDefs && isDefinitionNode(node)) return true;
  if (coarseOpenOnly) {
    const cs = coarseSet || coarseDagSet();
    if (!cs.has(name) && isShallowlyClosedFromCoarse(name, cs, new Set())) {
      return true;
    }
  }
  return false;
}

// Visible-node map (after applying both DAG filters).
function getVisibleNodes() {
  if (includeDefs && !coarseOpenOnly) return allNodes;
  const coarseSet = coarseOpenOnly ? coarseDagSet() : null;
  const out = {};
  for (const [name, node] of Object.entries(allNodes)) {
    if (!isHiddenNode(name, node, coarseSet)) out[name] = node;
  }
  return out;
}

// Resolve a hidden node's "first visible ancestors" — the set of visible-node
// names reachable by transitively dipping through hidden imports. Memoized;
// cycle-safe.
function definitionClosureFor(hiddenName, stack) {
  if (defClosureMemo.has(hiddenName)) return defClosureMemo.get(hiddenName);
  if (stack.has(hiddenName)) return new Set();  // cycle guard
  stack.add(hiddenName);
  const node = allNodes[hiddenName];
  const coarseSet = coarseOpenOnly ? coarseDagSet() : null;
  const out = new Set();
  for (const imp of (node?.imports || [])) {
    const sub = allNodes[imp];
    if (!sub) continue;
    if (isHiddenNode(imp, sub, coarseSet)) {
      for (const v of definitionClosureFor(imp, stack)) out.add(v);
    } else {
      out.add(imp);
    }
  }
  stack.delete(hiddenName);
  defClosureMemo.set(hiddenName, out);
  return out;
}

// Rewired imports for a visible node. With both toggles default (defs in,
// coarse-open off), returns `node.imports` filtered to known nodes. Otherwise
// rewires through hidden→hidden chains; falls back to [PREAMBLE_NAME] for
// non-Preamble nodes whose closure came up empty so the DAG stays rooted.
function getVisibleImports(name) {
  const node = allNodes[name];
  if (!node) return [];
  const raw = node.imports || [];
  if (includeDefs && !coarseOpenOnly) {
    const out = [];
    for (const imp of raw) if (allNodes[imp]) out.push(imp);
    return out;
  }
  const coarseSet = coarseOpenOnly ? coarseDagSet() : null;
  const seen = new Set();
  const out = [];
  for (const imp of raw) {
    const sub = allNodes[imp];
    if (!sub) continue;
    if (isHiddenNode(imp, sub, coarseSet)) {
      for (const v of definitionClosureFor(imp, new Set())) {
        if (!seen.has(v)) { seen.add(v); out.push(v); }
      }
    } else {
      if (!seen.has(imp)) { seen.add(imp); out.push(imp); }
    }
  }
  if (out.length === 0 && name !== PREAMBLE_NAME && allNodes[PREAMBLE_NAME]) {
    out.push(PREAMBLE_NAME);
  }
  return out;
}

function applyDagFilterChange() {
  invalidateDefClosure();
  // If the currently-selected node became invisible under the new filter
  // combination, drop the selection so the Node detail tab doesn't keep
  // displaying a node that no longer appears anywhere in the DAG.
  if (selectedNode && allNodes[selectedNode]
      && isHiddenNode(selectedNode, allNodes[selectedNode], coarseOpenOnly ? coarseDagSet() : null)) {
    selectedNode = null;
  }
  // Re-render everything that depends on the visible-node set / rewired edges.
  lastNodeRenderKey = null;
  // Progress tab caches its rendered chart by a key that includes includeDefs;
  // invalidate so it repaints on toggle.
  lastProgressDataKey = null;
  // Preserve current viewBox before the DAG re-renders.
  const svg = document.getElementById('dag-svg');
  const savedVB = svg ? svg.getAttribute('viewBox') : null;
  renderHeader();
  renderDAG();
  if (savedVB && svg) svg.setAttribute('viewBox', savedVB);
  renderCurrentDetail();
}

function setIncludeDefs(value) {
  const next = !!value;
  if (next === includeDefs) return;
  includeDefs = next;
  try { localStorage.setItem(INCLUDE_DEFS_STORAGE_KEY, next ? '1' : '0'); } catch {}
  const cb = document.getElementById('include-defs-checkbox');
  if (cb) cb.checked = next;
  applyDagFilterChange();
}

function setCoarseOpenOnly(value) {
  const next = !!value;
  if (next === coarseOpenOnly) return;
  coarseOpenOnly = next;
  try { localStorage.setItem(COARSE_OPEN_STORAGE_KEY, next ? '1' : '0'); } catch {}
  const cb = document.getElementById('coarse-open-checkbox');
  if (cb) cb.checked = next;
  applyDagFilterChange();
}

function activeNodeNames(kind) {
  const visible = getVisibleNodes();
  return Object.entries(visible)
    .filter(([, node]) => !!(node.activity && node.activity[kind]))
    .map(([name]) => name);
}

function summarizeNames(names, limit = 3) {
  if (!names.length) return '';
  if (names.length <= limit) return names.join(', ');
  return `${names.slice(0, limit).join(', ')} +${names.length - limit} more`;
}

function currentActivityText() {
  const meta = currentState?.meta || {};
  const state = currentState?.state || {};
  const corr = activeNodeNames('correspondence');
  const sound = activeNodeNames('soundness');
  const review = activeNodeNames('reviewer');
  const worker = activeNodeNames('worker');
  const openRejections = Array.isArray(state.open_rejections) ? state.open_rejections : [];

  if (openRejections.some(text => String(text || '').startsWith('authoritative checker mismatch:'))) {
    return 'Current activity: authoritative checker mismatch flagged';
  }

  if (corr.length) return `Current activity: correspondence verification on ${summarizeNames(corr)}`;
  if (sound.length) return `Current activity: NL proof soundness on ${summarizeNames(sound)}`;
  if (review.length) return `Current activity: reviewer decision on ${summarizeNames(review)}`;
  if (worker.length) return `Current activity: worker edits on ${summarizeNames(worker)}`;

  if (meta.source === 'worker') return 'Current activity: worker burst';
  if (meta.source === 'verification') return 'Current activity: verification';
  if (meta.source === 'reviewer') return 'Current activity: reviewer decision';
  if (meta.source === 'invalid') return 'Current activity: invalid attempt review';
  if (meta.source === 'cycle' || meta.source === 'git') return 'Current activity: committed cycle snapshot';
  if (state.awaiting_human_input) return 'Current activity: awaiting human input';
  return 'Current activity: idle';
}

function renderHeader() {
  const liveCycle = currentState.meta?.in_flight_cycle ?? currentState.state?.cycle ?? '?';
  const openRejections = Array.isArray(currentState?.state?.open_rejections) ? currentState.state.open_rejections : [];
  const rejectionSuffix = openRejections.length ? ` | Rejections: ${openRejections.length}` : '';
  const visible = getVisibleNodes();
  const visibleNames = Object.keys(visible);
  const closedCount = visibleNames.filter(name => isCommittedClosed(name, visible)).length;
  // Patch C unverified count over the visible set: one of "closed-but-unverified"
  // is still a Lean obligation per §12.1, surfaced inline in the status line.
  const unverifiedCount = visibleNames.filter(name => getClosureStatus(name) === 'unverified').length;
  const unverifiedSuffix = unverifiedCount ? ` | unverified: ${unverifiedCount}` : '';
  const defsHiddenSuffix = includeDefs ? '' : ' | defs hidden';
  document.getElementById('header-status').textContent =
    `Cycle ${liveCycle} | Phase: ${currentState.state.phase} | ${closedCount}/${visibleNames.length} closed${unverifiedSuffix}${rejectionSuffix}${defsHiddenSuffix}`;
  document.getElementById('header-activity').textContent = currentActivityText();
  renderClosureSummaryBanner();
}

// Patch C local-closure summary banner. Reads
// `currentState.local_closure_summary` (injected by viewer/server.js's
// `augmentViewerStateClosure`). Hidden when the count is zero or the field is
// absent; otherwise shows total unverified, transport vs script error split,
// and the latest 3 failure messages so the operator can triage from the DAG
// view without opening per-node detail panes.
function renderClosureSummaryBanner() {
  const banner = document.getElementById('closure-summary-banner');
  if (!banner) return;
  const summary = currentState?.local_closure_summary;
  if (!summary || !summary.unverified_count) {
    banner.style.display = 'none';
    banner.innerHTML = '';
    return;
  }
  const counts = [
    `total <code>${summary.unverified_count}</code>`,
    `transport <code>${summary.transport_error_count || 0}</code>`,
    `script <code>${summary.script_error_count || 0}</code>`,
    `other <code>${summary.other_error_count || 0}</code>`,
    `records <code>${summary.record_count || 0}</code>`,
  ];
  const latest = Array.isArray(summary.latest_failures) ? summary.latest_failures : [];
  const items = latest.map(f => {
    const node = escHtml(String(f.node || '?'));
    const status = escHtml(String(f.status || ''));
    const stderr = escHtml(String(f.stderr_excerpt || '').slice(0, 160));
    const cycle = f.captured_at_cycle ? ` @ cycle ${f.captured_at_cycle}` : '';
    const violations = (f.axiom_violations || []).slice(0, 2).map(escHtml).join(', ');
    const strict = (f.strict_errors || []).slice(0, 2).map(escHtml).join(', ');
    const detail = [
      stderr ? `<span style="color:#d8d8d8">${stderr}</span>` : '',
      violations ? `<span style="color:#ff79c6">axioms: ${violations}</span>` : '',
      strict ? `<span style="color:#ff79c6">strict: ${strict}</span>` : '',
    ].filter(Boolean).join(' &middot; ');
    return `<li><code>${node}</code> &middot; <span style="color:#ffb86c">${status}</span>${cycle}${detail ? ' &middot; ' + detail : ''}</li>`;
  }).join('');
  banner.innerHTML = `
    <h3>Local-closure unverified</h3>
    <div class="closure-counts">${counts.map(c => `<span>${c}</span>`).join('')}</div>
    ${items ? `<ul>${items}</ul>` : '<div style="color:#a0a0a0">No failure summaries published.</div>'}
  `;
  banner.style.display = '';
}

function liveCycleNumber() {
  return liveState?.meta?.in_flight_cycle ?? liveState?.state?.cycle ?? currentState?.meta?.in_flight_cycle ?? currentState?.state?.cycle ?? '?';
}

function appBasePath() {
  const path = (window.location.pathname || '/').replace(/\/index\.html$/, '');
  if (!path || path === '/') return '';
  return path.endsWith('/') ? path.slice(0, -1) : path;
}

function apiPath(rel) {
  return `${appBasePath()}/api/${rel}`.replace(/^\/\//, '/');
}

async function fetchViewerState(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${url} -> ${res.status}`);
  return res.json();
}

// Paper-defined KaTeX macros, parsed from <project>/paper/header.tex.
// Empty until loadPaperHeaderMacros() finishes; renderTexInto merges
// these into KaTeX's `macros` option so paper-preamble shortcuts
// (\p, \e, \PP, \floor, ...) render in the viewer.
let paperMacros = {};
async function loadPaperHeaderMacros() {
  try {
    const r = await fetch(apiPath('paper-header.tex'));
    if (!r.ok) return;
    const text = await r.text();
    const re = /^\s*\\(?:re)?newcommand\s*\{\\([A-Za-z]+)\}(?:\[(\d+)\])?\s*\{(.+)\}\s*$/;
    const out = {};
    for (const line of text.split('\n')) {
      if (/^\s*%/.test(line) || !line.trim()) continue;
      const m = line.match(re);
      if (!m) continue;
      // Skip macros whose body uses commands KaTeX can't render
      // (notably \todo from author-markup macros if anyone keeps them).
      if (/\\todo\b/.test(m[3])) continue;
      out['\\' + m[1]] = m[3];
    }
    paperMacros = out;
  } catch {
    // best-effort: no header.tex / network blip → fall back to defaults
  }
}

async function fetchData() {
  try {
    const [viewerRes, cyclesRes] = await Promise.all([
      fetchViewerState(apiPath('viewer-state.json')),
      fetch(apiPath('cycles.json')).then(async r => {
        if (!r.ok) throw new Error(`cycles.json -> ${r.status}`);
        return r.json();
      }),
      loadPaperHeaderMacros(),
    ]);
    allNodes = viewerRes.nodes || {};
    invalidateDefClosure();
    liveState = viewerRes;
    currentState = viewerRes;
    allCycles = cyclesRes;
    // Drop semantic-closure cache entries from stale cycles. Server-side
    // cache is per-cycle too, so a cleared client cache just means the
    // next click hits a fast cached server response, not a slow recompute.
    maybeInvalidateSemanticClosureCache();
    renderHeader();

    // Setup slider
    const slider = document.getElementById('cycle-slider');
    const cycleNums = Array.from(new Set(allCycles.map(c => c.cycle))).sort((a, b) => a - b);
    timelineSlots = [...cycleNums, 'current'];
    slider.min = 0;
    slider.max = Math.max(timelineSlots.length - 1, 0);
    slider.value = slider.max;
    renderTimelineSlotLabels();
    updateCycleInfo();
    prewarmHistoricalStates(cycleNums);

    renderDAG();
    renderFeedbackPanel();
    renderCurrentDetail();
  } catch (err) {
    document.getElementById('header-status').textContent = `Viewer load failed: ${err.message}`;
    document.getElementById('header-activity').textContent = 'Current activity: unavailable';
    console.error(err);
  }
}

function isRecursivelyClosed(name, nodes) {
  const node = nodes[name];
  if (!node || !isCommittedClosed(name, nodes)) return false;
  // Walk the rewired (visible) imports so the recursive-closed predicate
  // matches what the user sees in the DAG. With the toggle ON this is
  // identical to walking node.imports filtered to known nodes; with the
  // toggle OFF it skips definition nodes (correct: their closure feeds
  // straight into the visible imports), and a node anchored only to the
  // Preamble (closure was empty) inherits closed-ness from Preamble.
  for (const imp of getVisibleImports(name)) {
    if (!nodes[imp]) continue;
    if (!isRecursivelyClosed(imp, nodes)) return false;
  }
  return true;
}

function isCommittedClosed(name, nodes) {
  const node = nodes[name];
  if (!node) return false;
  const committed = currentState?.state?.committed || {};
  const present = Array.isArray(committed.present_nodes) ? committed.present_nodes : null;
  const open = Array.isArray(committed.open_nodes) ? committed.open_nodes : null;
  if (!present || !open) return node.status === 'closed';
  return present.includes(name) && !open.includes(name);
}

// Patch C local-closure status (per LOCAL_CLOSURE_IMPL_PLAN.md §9). Reads
// `closure_status` injected by viewer/server.js's `augmentViewerStateClosure`.
// Falls back to deriving from raw state fields if the augmentation is missing
// (e.g., older server build), and to 'verified'/'open' (legacy two-state) when
// the Patch C fields aren't published yet.
//
// Tier alignment (audit LOW fix): coloring is committed-DAG-based (uses
// `committed.open_nodes`/`present_nodes`), so the fallback prefers the
// committed closure mirrors (`committed_local_closure_*`) over the live-tier
// fields. Live fields are only used when the committed mirror is absent
// (pre-Patch-C-A snapshot or migrated state without mirror-ready).
function getClosureStatus(name) {
  const cs = currentState?.closure_status;
  if (cs && Object.prototype.hasOwnProperty.call(cs, name)) {
    return cs[name];
  }
  const state = currentState?.state || {};
  const committed = state.committed || {};
  const present = Array.isArray(committed.present_nodes) ? committed.present_nodes : null;
  const open = Array.isArray(committed.open_nodes) ? committed.open_nodes : null;
  const unverified = Array.isArray(state.committed_local_closure_unverified_nodes)
    ? state.committed_local_closure_unverified_nodes
    : (Array.isArray(state.local_closure_unverified_nodes)
        ? state.local_closure_unverified_nodes // fallback
        : []);
  // `committed_local_closure_records` is no longer shipped on the wire — the
  // server now ships only `local_closure_records` (same key set as the
  // committed mirror in practice; only ~10/405 values differ, none of which
  // this lookup cares about — only existence is checked).
  const records = (state.local_closure_records && typeof state.local_closure_records === 'object')
    ? state.local_closure_records
    : {};
  if (present && !present.includes(name)) return 'absent';
  if (open && open.includes(name)) return 'open';
  if (unverified.includes(name)) return 'unverified';
  if (records[name]) return 'verified';
  return 'verified';
}

function getNodeClass(name, nodes) {
  const node = nodes[name];
  if (!node) return 'open';
  if (currentState.state.active_node === name) return 'active';
  // Compose closure-status class with the legacy closed/open class. The
  // unverified flag is orthogonal to recursive-closed (a recursively closed
  // sub-DAG can still contain unverified nodes), so emit BOTH classes — CSS
  // overrides via .node.unverified take care of the color swap.
  let base;
  if (isRecursivelyClosed(name, nodes)) base = 'recursive-closed';
  else if (isCommittedClosed(name, nodes)) base = 'closed';
  else base = 'open';
  const closure = getClosureStatus(name);
  return closure === 'unverified' ? `${base} unverified` : base;
}

// Build the SVG <title> tooltip text for a node. For Patch C unverified
// nodes, surface the failure summary (status, returncode, stderr excerpt,
// axiom_violations, strict_errors). For verified/open nodes, return a brief
// status line — the existing detail pane handles full info on click.
function nodeHoverTooltip(name) {
  const closure = getClosureStatus(name);
  const lines = [];
  lines.push(`${name}`);
  lines.push(`closure: ${closure}`);
  if (closure === 'unverified') {
    // Tier alignment: prefer committed mirror over live-tier field so the
    // tooltip's failure summary stays consistent with the committed-DAG
    // coloring (per audit LOW fix).
    const failures = currentState?.state?.committed_local_closure_failures
      || currentState?.state?.local_closure_failures // fallback
      || {};
    const f = failures[name];
    if (f && typeof f === 'object') {
      if (f.status) lines.push(`status: ${f.status}`);
      if (f.returncode !== undefined && f.returncode !== null) lines.push(`rc: ${f.returncode}`);
      if (f.retry_count) lines.push(`retries: ${f.retry_count}${f.retry_exhausted ? ' (exhausted)' : ''}`);
      const violations = Array.isArray(f.axiom_violations) ? f.axiom_violations : [];
      if (violations.length) {
        lines.push(`axiom violations: ${violations.slice(0, 4).join(', ')}${violations.length > 4 ? ` +${violations.length - 4} more` : ''}`);
      }
      const strict = Array.isArray(f.strict_errors) ? f.strict_errors : [];
      if (strict.length) {
        lines.push(`strict errors: ${strict.slice(0, 4).join(', ')}${strict.length > 4 ? ` +${strict.length - 4} more` : ''}`);
      }
      const stderr = String(f.stderr_excerpt || '').trim();
      if (stderr) {
        const trimmed = stderr.length > 240 ? stderr.slice(0, 240) + '…' : stderr;
        lines.push(`stderr: ${trimmed}`);
      }
    } else {
      lines.push('(no failure summary published yet)');
    }
  }
  return lines.join('\n');
}

function getWorkerFocusName() {
  const state = currentState?.state || {};
  const meta = currentState?.meta || {};
  if (meta.source !== 'worker') return '';
  if (state.phase === 'theorem_stating') return state.active_node || state.theorem_soundness_target || '';
  if (state.phase === 'proof_formalization') return state.active_node || '';
  return '';
}

function renderDAG() {
  const svg = document.getElementById('dag-svg');
  svg.innerHTML = '';

  // When the toggle is OFF, definition nodes are dropped from the visible
  // set and import edges are rewired through getVisibleImports() so the
  // surviving DAG stays connected (with the Preamble as the root fallback).
  const visibleNodes = getVisibleNodes();
  const names = Object.keys(visibleNodes);
  if (!names.length) return;

  // Build edges: child -> parent (import direction). Rewired imports are
  // used so definition→definition chains have already been collapsed.
  const edges = [];
  for (const name of names) {
    for (const imp of getVisibleImports(name)) {
      if (visibleNodes[imp]) edges.push([name, imp]); // name depends on imp
    }
  }

  const positions = layoutDAG(visibleNodes, edges);

  // Shift to positive coordinates
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of Object.values(positions)) {
    minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
  }
  const offX = -minX + 120, offY = -minY + 40;
  for (const p of Object.values(positions)) { p.x += offX; p.y += offY; }

  svg.setAttribute('viewBox', `0 0 ${maxX - minX + 280} ${maxY - minY + 120}`);

  const ns = 'http://www.w3.org/2000/svg';
  const workerFocusName = getWorkerFocusName();

  // Arrow marker
  const defs = document.createElementNS(ns, 'defs');
  const marker = document.createElementNS(ns, 'marker');
  marker.setAttribute('id', 'arrow'); marker.setAttribute('viewBox', '0 0 10 10');
  marker.setAttribute('refX', '10'); marker.setAttribute('refY', '5');
  marker.setAttribute('markerWidth', '8'); marker.setAttribute('markerHeight', '8');
  marker.setAttribute('orient', 'auto-start-reverse');
  const arrowPath = document.createElementNS(ns, 'path');
  arrowPath.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
  arrowPath.setAttribute('fill', 'context-stroke');
  marker.appendChild(arrowPath); defs.appendChild(marker); svg.appendChild(defs);

  const nodeHalfHeight = (name) => isHelperNode(visibleNodes[name]) ? 10 : 20;

  // Draw edges — style encodes soundness status of the importing (from) node.
  // Since dependencies sit above their importers in the layered layout, draw
  // each edge from the top of the lower node to the bottom of the upper node
  // so the arrowhead remains visible outside the target box.
  for (const [from, to] of edges) {
    const p1 = positions[from], p2 = positions[to];
    if (!p1 || !p2) continue;
    const fromNode = visibleNodes[from];
    const soundnessWorking = !!fromNode?.activity?.soundness;
    const proofStatus = fromNode?.verification?.nl_proof || '?';
    const edgeStatusClass =
      isCommittedClosed(from, visibleNodes) ? ' to-closed' :
      (proofStatus === 'pass' ? ' edge-nl-pass' :
       (proofStatus === 'fail' || proofStatus === 'structural' ? ' edge-failed' : ' edge-unknown'));
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y - nodeHalfHeight(from));
    line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y + nodeHalfHeight(to));
    line.setAttribute(
      'class',
      'edge'
      + edgeStatusClass
      + (soundnessWorking ? ' soundness-working' : '')
    );
    line.setAttribute('marker-end', 'url(#arrow)');
    line.dataset.from = from;
    line.dataset.to = to;
    svg.appendChild(line);
  }

  // Draw nodes
  for (const [name, pos] of Object.entries(positions)) {
    const node = visibleNodes[name];
    if (!node) continue;
    const cls = getNodeClass(name, visibleNodes);

    const g = document.createElementNS(ns, 'g');
    const diffCls = (node.difficulty === 'easy') ? 'easy' : 'hard';
    g.setAttribute(
      'class',
      `node ${cls} ${diffCls}`
      + (selectedNode === name ? ' selected' : '')
      + (workerFocusName === name ? ' worker-working' : '')
      + (node.activity?.reviewer ? ' reviewer-working' : '')
      + (node.activity?.correspondence ? ' correspondence-working' : '')
    );
    g.style.cursor = 'pointer';
    g.onclick = () => selectNode(name);
    g.onmouseenter = () => {
      hoveredNode = name;
      updateEdgeEmphasis();
    };
    g.onmouseleave = () => {
      if (hoveredNode === name) hoveredNode = null;
      updateEdgeEmphasis();
    };

    // Shape selection:
    //   definition node → diamond (rotated square via polygon)
    //   helper node → compact circle without an in-node label
    //   proof-bearing node → rectangle; paper-target covering nodes get
    //     square corners, all others get rounded corners.
    const theoremLike = ['theorem', 'corollary', 'proposition'].includes(node.texEnv);
    const helperLike = isHelperNode(node);
    // `isDefinition` is precomputed server-side (see thinViewerStatePayload)
    // so the DAG shape selector doesn't need the full Lean source.
    const definitionLike = node.isDefinition === true
      || node.texEnv === 'definition'
      || (node.leanContent || '').match(/^(noncomputable\s+)?def\s/m);
    const W = 180, H = 40, helperD = H / 2, helperR = helperD / 2;
    g.setAttribute('transform', helperLike
      ? `translate(${pos.x - helperR}, ${pos.y - helperR})`
      : `translate(${pos.x - W / 2}, ${pos.y - H / 2})`);
    let shape;
    if (helperLike) {
      shape = document.createElementNS(ns, 'circle');
      shape.setAttribute('cx', helperR); shape.setAttribute('cy', helperR); shape.setAttribute('r', helperR);
    } else if (definitionLike) {
      shape = document.createElementNS(ns, 'polygon');
      // Diamond inscribed in the same 180×40 box: top, right, bottom, left.
      shape.setAttribute('points', `${W/2},0 ${W},${H/2} ${W/2},${H} 0,${H/2}`);
    } else {
      shape = document.createElementNS(ns, 'rect');
      shape.setAttribute('width', W); shape.setAttribute('height', H);
      const cornerR = node.coversTarget ? 0 : 12;
      shape.setAttribute('rx', cornerR); shape.setAttribute('ry', cornerR);
    }
    const rect = shape;  // alias kept so downstream stroke/fill writes still work
    g.appendChild(shape);

    // Hover tooltip — uses native SVG <title> so the browser surfaces it via
    // the standard hover delay. For Patch C unverified nodes, includes the
    // failure status, returncode, stderr excerpt, axiom violations and strict
    // errors so the operator can triage without leaving the DAG view.
    {
      const titleEl = document.createElementNS(ns, 'title');
      titleEl.textContent = nodeHoverTooltip(name);
      g.appendChild(titleEl);
    }

    // Difficulty label above the name (suppressed for definition nodes —
    // easy/hard is a proof-effort signal that doesn't apply to defs).
    const diff = node.difficulty || '';
    const showDiff = diff && !definitionLike && !helperLike;
    if (showDiff) {
      const diffText = document.createElementNS(ns, 'text');
      diffText.setAttribute('x', 90); diffText.setAttribute('y', 13);
      diffText.setAttribute('text-anchor', 'middle');
      diffText.setAttribute('class', diff === 'easy' ? 'diff-easy' : 'diff-hard');
      diffText.textContent = diff === 'easy' ? 'easy' : 'hard';
      g.appendChild(diffText);
    }
    const kindPrefix = node.kind === 'preamble' ? '' :
      definitionLike ? 'D: ' :
      helperLike ? 'H: ' :
      theoremLike ? 'T: ' : 'L: ';
    const label = (kindPrefix + (node.title || name)).substring(0, 26);
    if (!helperLike) {
      const text = document.createElementNS(ns, 'text');
      text.setAttribute('x', 90); text.setAttribute('y', showDiff ? 28 : 24);
      text.setAttribute('text-anchor', 'middle');
      text.textContent = label;
      g.appendChild(text);
    }

    // Node border style encodes correspondence status
    const verif = node.verification || {};
    const corrStatus = node.kind === 'preamble' ? 'pass' : (verif.correspondence || '?');
    if (corrStatus === 'fail') rect.setAttribute('stroke-dasharray', '2 3');       // dotted
    else if (corrStatus === '?') rect.setAttribute('stroke-dasharray', '8 4');     // dashed
    // else solid (no dasharray)
    svg.appendChild(g);
  }

  updateEdgeEmphasis();
}

function selectNode(name) {
  selectedNode = name;
  // Preserve current viewBox before re-render
  const svg = document.getElementById('dag-svg');
  const savedVB = svg.getAttribute('viewBox');
  renderDAG();
  if (savedVB) svg.setAttribute('viewBox', savedVB);
  renderCurrentDetail();
  // On mobile, swap to the Details pane so the tap feels like a drill-down.
  setMobilePane('detail');
}

function updateEdgeEmphasis() {
  const active = hoveredNode || selectedNode;
  document.querySelectorAll('#dag-svg .edge').forEach(edge => {
    const dependencyEdge = active && edge.dataset.from === active;
    edge.classList.toggle('active', !!dependencyEdge);
  });
}

// ---------------------------------------------------------------------------
// Per-node semantic-closure cache + helpers (client side).
//
// The supervisor caches semantic-payload sidecars on disk; the server-side
// `/api/semantic-closure/:node` endpoint pre-caches the closure-name list
// per (cycle, node). We additionally cache the same value here in the
// browser, keyed on cycle, so an auto-refresh re-render restores the
// populated body synchronously without flashing back to "loading…".
//
// Cache shape: Map<string, {closure: string[]|null, cached: bool, cycle: number}>.
// Key: `${cycle}:${node}`. Cleared on cycle advance via fetchData/maybeBumpCycle.
// ---------------------------------------------------------------------------
const semanticClosureClientCache = new Map();
let semanticClosureClientCycle = null;

function maybeInvalidateSemanticClosureCache() {
  // Called from fetchData when the live state arrives. If the live cycle
  // has advanced since our last cached entry, drop everything: the
  // server side has already invalidated under the hood, and our keys
  // include the cycle, so old entries just become unreachable. Cheap
  // explicit clear keeps memory tidy.
  const liveCycle = liveState?.state?.cycle;
  if (typeof liveCycle === 'number' && liveCycle !== semanticClosureClientCycle) {
    semanticClosureClientCache.clear();
    semanticClosureClientCycle = liveCycle;
  }
}

function renderSemanticClosureBody(name) {
  const cycle = liveState?.state?.cycle;
  if (typeof cycle !== 'number') return '';
  const cached = semanticClosureClientCache.get(`${cycle}:${name}`);
  if (!cached) return '';
  return formatSemanticClosureHtml(cached);
}

function formatSemanticClosureHtml(data) {
  const closure = data && Array.isArray(data.closure) ? data.closure : null;
  if (closure === null) {
    return `<span style="color:#6272a4">no cached semantic-payload yet — this node may be newly introduced or its cache entry was evicted. The supervisor will populate it on its next observation pass.</span>`;
  }
  if (closure.length === 0) {
    return `<span style="color:#6272a4">(empty — no project-defined Tablet nodes in this seed's type-surface closure; all external/Mathlib)</span>`;
  }
  const sorted = [...closure].sort();
  const links = sorted.map((dep) => {
    const safe = String(dep).replace(/[^A-Za-z0-9_]/g, '');
    if (!safe || !allNodes[safe]) return escHtml(String(dep));
    return `<a href="#" onclick="event.preventDefault(); selectNode('${safe}');" style="color:#8be9fd;text-decoration:none">${escHtml(dep)}</a>`;
  }).join(', ');
  const meta = data.cached ? ` <span style="color:#6272a4;font-size:10px">(cycle ${data.cycle}, cached)</span>` : '';
  return `${links}${meta}<div style="color:#6272a4;font-size:10px;margin-top:4px">${sorted.length} node${sorted.length === 1 ? '' : 's'} — theorem closures hash the seed's TYPE only; proof-only dependencies are excluded.</div>`;
}

let semanticClosureInFlight = new Set(); // names with an active fetch

async function loadSemanticClosure(name, bodyElementId) {
  const cycle = liveState?.state?.cycle;
  if (typeof cycle !== 'number') return;
  const key = `${cycle}:${name}`;
  // If we already have a result, repopulate (in case the body got reset).
  const cached = semanticClosureClientCache.get(key);
  if (cached) {
    const body = document.getElementById(bodyElementId);
    if (body) body.innerHTML = formatSemanticClosureHtml(cached);
    return;
  }
  if (semanticClosureInFlight.has(key)) return;
  semanticClosureInFlight.add(key);
  const body0 = document.getElementById(bodyElementId);
  if (body0) body0.textContent = 'loading…';
  try {
    const r = await fetch(apiPath(`semantic-closure/${encodeURIComponent(name)}`));
    if (!r.ok) {
      const text = await r.text().catch(() => '');
      const body = document.getElementById(bodyElementId);
      if (body) body.textContent = `error: HTTP ${r.status} ${text.slice(0, 200)}`;
      return;
    }
    const data = await r.json();
    semanticClosureClientCache.set(key, data);
    const body = document.getElementById(bodyElementId);
    if (body) body.innerHTML = formatSemanticClosureHtml(data);
  } catch (e) {
    const body = document.getElementById(bodyElementId);
    if (body) body.textContent = `error: ${e.message}`;
  } finally {
    semanticClosureInFlight.delete(key);
  }
}

// Capture the set of currently-expanded collapsibles, the open/closed
// state of each <details class=node-section>, and the pane scroll
// position so we can restore them after a re-render. Stable IDs on
// every collapsible / section (added below) make this work across
// data updates.
function captureNodeDetailUiState() {
  const pane = document.getElementById('detail-content');
  const expanded = new Set();
  const sectionsClosed = new Set();
  const sectionsOpen = new Set();
  if (pane) {
    pane.querySelectorAll('.collapsible.expanded').forEach((el) => {
      if (el.id) expanded.add(el.id);
    });
    pane.querySelectorAll('details.node-section').forEach((el) => {
      if (!el.id) return;
      if (el.open) sectionsOpen.add(el.id);
      else sectionsClosed.add(el.id);
    });
  }
  return {
    expanded,
    sectionsOpen,
    sectionsClosed,
    scrollTop: pane ? pane.scrollTop : 0,
  };
}
function restoreNodeDetailUiState(snap) {
  if (!snap) return;
  const pane = document.getElementById('detail-content');
  if (!pane) return;
  for (const id of snap.expanded) {
    const el = document.getElementById(id);
    if (el) el.classList.add('expanded');
  }
  // For each section the user explicitly toggled away from its default,
  // re-apply that choice. Sections not in either set keep the default
  // open state from the rendered HTML.
  for (const id of snap.sectionsOpen || []) {
    const el = document.getElementById(id);
    if (el && el.tagName === 'DETAILS') el.open = true;
  }
  for (const id of snap.sectionsClosed || []) {
    const el = document.getElementById(id);
    if (el && el.tagName === 'DETAILS') el.open = false;
  }
  pane.scrollTop = snap.scrollTop || 0;
}

// Last-rendered signature so we skip re-render when nothing changed —
// the periodic 30s refresh otherwise nukes the pane and resets scroll.
// Also: any time renderNodeDetail rewrites pane.innerHTML, the
// Progress/Usage/Kernel/Chat shells get destroyed; their renderers
// re-detect the missing shell and rebuild. So no extra reset is needed
// here — but we DO have to invalidate this key when other tabs nuke
// the pane themselves (so coming back to Node forces a rebuild too).
let lastNodeRenderKey = null;

// ---------------------------------------------------------------
// Rendered-TeX toggle (per-node, persists in localStorage).
// Toggle defaults OFF: when off, the .tex field renders identically
// to the prior `escHtml(node.texContent)` — backwards compatible.
// When on, we pre-process noderefs + theorem/proof environments into
// HTML, then call KaTeX `renderMathInElement` for math segments.
// ---------------------------------------------------------------
const RENDERED_TEX_STORAGE_KEY = 'trellis.viewer.renderedTex';

function isRenderedTexEnabled() {
  try {
    // Default ON: only return false if the user has explicitly opted out.
    // Previously defaulted OFF for backwards compat with the pre-KaTeX
    // viewer; now that the rendered path is well-tested it's the better
    // first impression.
    const v = localStorage.getItem(RENDERED_TEX_STORAGE_KEY);
    if (v === null) return true;
    return v === '1';
  } catch {
    return true;
  }
}

function setRenderedTexEnabled(on) {
  try {
    localStorage.setItem(RENDERED_TEX_STORAGE_KEY, on ? '1' : '0');
  } catch {}
  // Force a fresh render of the currently-selected node so the field
  // swaps between raw and rendered immediately.
  lastNodeRenderKey = null;
  if (selectedNode) renderNodeDetail(selectedNode);
}

// Build the inner HTML of the .tex field-value div. For raw mode, this
// is byte-identical to the prior code path (`escHtml(... || '(none)')`
// inside a `.field-value`). For rendered mode, we still emit the same
// outer div but leave the body to be filled in by `renderTexInto` once
// KaTeX has loaded.
//
// No longer wraps in an inner `.collapsible` — the parent <details>
// section in the node-detail layout already handles open/close, so a
// nested collapse-inside-collapse confused the affordance.
function renderTexFieldValueHtml(domId, raw) {
  if (isRenderedTexEnabled()) {
    return `<div id="${domId}" class="field-value rendered-tex"></div>`;
  }
  return `<div id="${domId}" class="field-value">${escHtml(raw || '(none)')}</div>`;
}

// =====================================================================
// Section extractors for the node-detail collapsibles.
// =====================================================================
//
// Lean Imports: parse `import Tablet.X` lines from the start of the
// .lean source. Mirrors the kernel's behavior in
// `paper_targets.rs::extract_tex_statement_items` (Tablet imports only).
// We also expose a Mathlib-imports view via `getVisibleImports(name)`
// (uses node.imports as the canonical source).
//
// NL statement: the first \begin{ENV}...\end{ENV} block with a
// non-`proof` env name. Same heuristic as the kernel's
// `tex_statement_environment` in filespec.rs.
//
// NL proof: the \begin{proof}...\end{proof} block (if any).
//
// Lean statement: the FILESPEC-v2 declaration-signature slice —
// the lines between `-- [TABLET NODE: <Name>]` and `-- BODY`, with
// imports skipped (they live above the tablet marker and are
// already rendered in the "Lean Imports" pane). For pre-FILESPEC-v2
// historical commits without `-- BODY`, falls back to a strip-imports
// + lastIndexOf(`:=`) heuristic.
//
// Lean Proof: the proof body — everything below `-- BODY`. For
// pre-FILESPEC-v2 historical commits, falls back to the slice after
// the last `:=`.
//
// All of these are best-effort string parses — the kernel has
// authoritative versions in Rust, but the viewer just needs a
// reasonable display. Edge cases (multi-block .tex, theorem with no
// `:=`, etc.) fall through to "(none)" or the full content.

function extractTexStatement(tex) {
  if (!tex) return '';
  const m = tex.match(/\\begin\{(\w+)\}[\s\S]*?\\end\{\1\}/);
  if (!m) return '';
  const env = m[1];
  if (env === 'proof') {
    // First env was the proof block — find a non-proof one further on.
    const m2 = tex.slice(m.index + m[0].length).match(/\\begin\{(\w+)\}[\s\S]*?\\end\{\1\}/);
    if (m2 && m2[1] !== 'proof') return m2[0];
    return '';
  }
  return m[0];
}

function extractTexProof(tex) {
  if (!tex) return '';
  const m = tex.match(/\\begin\{proof\}[\s\S]*?\\end\{proof\}/);
  return m ? m[0] : '';
}

// FILESPEC v2 statement/proof boundary: every ordinary
// `Tablet/<Node>.lean` carries exactly one line whose trimmed
// content is `-- BODY`. Mirrors the kernel splitter in
// `kernel/src/filespec_split.rs`. Returns `{start, end}` byte
// offsets bracketing the marker line (`text.slice(0, start)` is
// the statement side, `text.slice(end)` is the proof body), or
// null if the marker is absent or ambiguous.
function findBodyMarker(text) {
  if (!text) return null;
  let offset = 0;
  let found = null;
  for (const line of text.split('\n')) {
    if (line.trim() === '-- BODY') {
      if (found) return null;  // multiple markers → ambiguous
      const eol = offset + line.length + 1;  // include the consumed '\n'
      found = { start: offset, end: Math.min(eol, text.length) };
    }
    offset += line.length + 1;
  }
  return found;
}

// FILESPEC v2 declaration-signature boundary: the
// `-- [TABLET NODE: <Name>]` line is the start of the protected
// region (everything below it up to `-- BODY` is the declaration's
// signature). Mirrors `filespec_split::find_tablet_node_marker_line`.
// Returns the byte offset of the first byte of that line, or null
// if absent / ambiguous.
function findTabletNodeMarkerLine(text) {
  if (!text) return null;
  let offset = 0;
  let found = null;
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (trimmed.startsWith('-- [TABLET NODE:') && trimmed.endsWith(']')) {
      if (found !== null) return null;  // multiple — ambiguous
      found = offset;
    }
    offset += line.length + 1;
  }
  return found;
}

// Pre-FILESPEC-v2 fallback used when no `-- BODY` marker is
// present (historical commits viewed in the timeline pane). The
// `:=` heuristic is fragile for filled-in proofs but stable for
// the `sorry`-placeholder era it has to cover.
function findLeanProofBoundaryFallback(text) {
  return text.lastIndexOf(':=');
}

function extractLeanStatement(lean) {
  if (!lean) return '';
  const marker = findBodyMarker(lean);
  if (marker) {
    // Skip the preamble — imports live above the tablet-node
    // marker by FILESPEC fiat (the "Lean Imports" pane already
    // renders them separately, so they'd be duplicated noise
    // here). Start at the line AFTER `-- [TABLET NODE: <Name>]`
    // so the statement pane shows only the declaration itself,
    // matching the kernel's hash region.
    const tabletStart = findTabletNodeMarkerLine(lean);
    if (tabletStart !== null) {
      const nlAfterMarker = lean.indexOf('\n', tabletStart);
      const start = nlAfterMarker < 0 ? tabletStart : nlAfterMarker + 1;
      return lean.slice(start, marker.start).trim();
    }
    // Tablet marker absent — fall back to returning everything
    // pre-BODY so we still show *something* useful on malformed
    // historical files.
    return lean.slice(0, marker.start).trimEnd();
  }
  const stripped = lean.replace(/^(?:\s*--[^\n]*\n|\s*import[^\n]*\n)+/g, '');
  const idx = findLeanProofBoundaryFallback(stripped);
  if (idx < 0) return stripped.trimEnd();
  return stripped.slice(0, idx).trimEnd();
}

function extractLeanProof(lean) {
  if (!lean) return '';
  const marker = findBodyMarker(lean);
  if (marker) return lean.slice(marker.end).trimStart();
  const stripped = lean.replace(/^(?:\s*--[^\n]*\n|\s*import[^\n]*\n)+/g, '');
  const idx = findLeanProofBoundaryFallback(stripped);
  if (idx < 0) return '';
  return stripped.slice(idx + 2).trimStart();
}

// Pre-process a TeX string into HTML before passing to KaTeX
// auto-render. Returns escaped+marked-up HTML; KaTeX will then walk
// the resulting DOM and replace math delimiters with rendered output.
function preprocessTexToHtml(raw) {
  if (!raw) return '<span style="color:#6272a4">(none)</span>';
  // Sentinel tokens — we extract structural pieces (noderefs, env
  // wrappers) so they survive HTML escaping as raw strings, then we
  // splice them back as real HTML after the escape step.
  const tokens = [];
  const placeholder = (html) => {
    const i = tokens.length;
    tokens.push(html);
    // Use a token format unlikely to appear in tex source AND
    // immune to later regex passes.
    return `␀TEXTOK${i}␀`;
  };

  let s = String(raw);

  // 0. \hbox → \text. KaTeX has no \hbox. Strip the dimensional form
  //    (\hbox to <dim>{...}) first, then the bare form. The paper's
  //    Tablet has ~17 \hbox usages, all in math mode for short text
  //    interpolations like `\hbox{ and }` — \text is the right
  //    KaTeX equivalent.
  s = s.replace(/\\hbox\s+to\s+\S+\s*/g, '\\text');
  s = s.replace(/\\hbox\b/g, '\\text');

  // 1. \noderef{Foo} OUTSIDE math → HTML clickable citation.
  //    Inside-math noderefs stay as `\noderef{...}` so KaTeX's macro
  //    (configured below) can render them as clickable \href links.
  //    To distinguish, we extract math segments into placeholders
  //    first, rewrite noderefs in the surrounding text, then put
  //    the math (with its in-math \noderef calls untouched) back.
  const mathPatterns = [
    /\$\$([\s\S]*?)\$\$/g,
    /\\\[([\s\S]*?)\\\]/g,
    /\\\(([\s\S]*?)\\\)/g,
    /(?<!\$)\$(?!\$)([^$\n]*?)(?<!\$)\$(?!\$)/g,  // $...$ on a single line
  ];
  const mathTokens = [];
  const mathPlaceholder = (content) => {
    const i = mathTokens.length;
    mathTokens.push(content);
    return `MATHTOK${i}END`;
  };
  for (const pat of mathPatterns) {
    s = s.replace(pat, (m) => mathPlaceholder(m));
  }

  // 1b. \noderef OUTSIDE math → HTML link. (Inside math, the
  //     KaTeX `\noderef` macro will produce a styled clickable
  //     `\href` element.)
  s = s.replace(/\\noderef\{([^{}]+)\}/g, (_m, target) => {
    const safe = String(target).replace(/[<>"&]/g, (c) => ({'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]));
    return placeholder(`<a class="noderef" data-target="${safe}">${safe}</a>`);
  });

  // 1c. Restore math segments.
  s = s.replace(/MATHTOK(\d+)END/g, (_m, idx) => mathTokens[Number(idx)] || '');

  // 2. Theorem-like environments → styled blocks with a bold label.
  //    Body still contains math delimiters; KaTeX walks them later.
  const envLabels = {
    lemma: 'Lemma.',
    theorem: 'Theorem.',
    corollary: 'Corollary.',
    proposition: 'Proposition.',
    definition: 'Definition.',
    remark: 'Remark.',
    helper: 'Helper.',
  };
  for (const [env, label] of Object.entries(envLabels)) {
    const re = new RegExp(`\\\\begin\\{${env}\\}([\\s\\S]*?)\\\\end\\{${env}\\}`, 'g');
    s = s.replace(re, (_m, body) => {
      // Re-escape body? No — body still contains math delimiters etc;
      // we'll process noderefs already done above and let the outer
      // escape pass handle the body's text characters.
      return placeholder(`<div class="tex-env tex-${env}"><span class="tex-env-label">${label}</span>`)
        + body
        + placeholder(`</div>`);
    });
  }

  // 3. Proof environment → label + trailing □.
  s = s.replace(/\\begin\{proof\}([\s\S]*?)\\end\{proof\}/g, (_m, body) => {
    return placeholder(`<div class="tex-env tex-proof"><span class="tex-env-label">Proof.</span>`)
      + body
      + placeholder(`<span class="tex-proof-end">□</span></div>`);
  });

  // 4. Now HTML-escape everything else. Token placeholders are
  //    plain ASCII letters + digits so they survive escaping
  //    unchanged; step 6 then splices in the real HTML.
  s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // 5. Convert paragraph breaks (blank lines) to a small vertical
  //    spacer; collapse single newlines to spaces. We deliberately
  //    avoid wrapping content in <p> tags here because env divs
  //    (extracted in step 2) span multiple paragraphs and would then
  //    nest illegally inside <p>. Plain <br><br> reads fine in the
  //    paper-style font we're using.
  s = s.replace(/\n\s*\n+/g, '<br><br>');
  s = s.replace(/\s*\n\s*/g, ' ');

  // 6. Splice token placeholders back as real HTML.
  s = s.replace(/␀TEXTOK(\d+)␀/g, (_m, idx) => tokens[Number(idx)] || '');

  return s;
}

function renderTexInto(elem, raw) {
  if (!elem) return;
  try {
    elem.innerHTML = preprocessTexToHtml(raw);
  } catch (err) {
    elem.innerHTML = `<span class="tex-error">tex preprocess error: ${escHtml(err.message || String(err))}</span>` +
      `<pre style="white-space:pre-wrap">${escHtml(raw || '')}</pre>`;
    return;
  }
  // KaTeX is loaded async-defer. If the user flips the toggle before
  // the script has hit the DOM, fall back to a one-shot poll.
  const tryRender = (attemptsLeft) => {
    if (typeof window.renderMathInElement === 'function') {
      try {
        window.renderMathInElement(elem, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '\\[', right: '\\]', display: true },
            { left: '\\(', right: '\\)', display: false },
            { left: '$', right: '$', display: false },
          ],
          throwOnError: false,
          errorColor: '#ff5555',
          // Allow \href links — the only one our macros emit uses a
          // `noderef:` URL scheme that the delegated click handler
          // intercepts. We don't want KaTeX rejecting that URL.
          trust: (ctx) => ctx.command === '\\href' && /^noderef:/.test(ctx.url || ''),
          // Macros: hardcoded defaults first (so projects without a
          // paper/header.tex still get sane ams* shortcuts), then
          // paper-defined macros override (the paper preamble is the
          // source of truth where it exists), then the trellis-
          // specific \noderef last so it always wins regardless of
          // what a paper might redefine.
          macros: {
            '\\R': '\\mathbb{R}',
            '\\N': '\\mathbb{N}',
            '\\Z': '\\mathbb{Z}',
            '\\Q': '\\mathbb{Q}',
            '\\C': '\\mathbb{C}',
            '\\Pr': '\\mathbb{P}',
            '\\E': '\\mathbb{E}',
            ...paperMacros,
            // In-math \noderef: render as a clickable styled
            // citation. The delegated click handler watches for
            // .rendered-tex a[href^="noderef:"] (and .noderef class
            // for out-of-math links) and calls selectNode(target).
            '\\noderef': '\\href{noderef:#1}{\\textsf{\\small{#1}}}',
          },
        });
      } catch (err) {
        // KaTeX itself failed — surface a small banner but leave the
        // pre-processed body in place so the rest is still readable.
        const banner = document.createElement('div');
        banner.className = 'tex-error';
        banner.textContent = `KaTeX render error: ${err.message || String(err)}`;
        elem.insertBefore(banner, elem.firstChild);
      }
      return;
    }
    if (attemptsLeft > 0) {
      setTimeout(() => tryRender(attemptsLeft - 1), 100);
    } else {
      const banner = document.createElement('div');
      banner.className = 'tex-error';
      banner.textContent = 'KaTeX failed to load (CDN unreachable?). Showing pre-processed source — turn off Rendered toggle for raw view.';
      elem.insertBefore(banner, elem.firstChild);
    }
  };
  tryRender(20);  // ~2 seconds total
}

// Delegated click handler for noderef citations. Two link shapes
